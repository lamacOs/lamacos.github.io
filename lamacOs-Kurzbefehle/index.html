<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lamacOs — Kurzbefehle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff7a00;
    --bg: #ffffff;
    --card: #ffffff;
    --text: #111111;
    --text-secondary: #666666;
    --border: #e5e7eb;
    --shadow: rgba(0,0,0,0.05);
    --shadow-accent: rgba(255,122,0,0.3);
    --danger: #e53e3e;
    --nav-bg: rgba(255,255,255,0.8);
  }
  [data-theme="dark"] {
    --bg: #0f1115;
    --card: #181c23;
    --text: #ffffff;
    --text-secondary: #b0b7c3;
    --border: #2c313a;
    --shadow: rgba(0,0,0,0.3);
    --nav-bg: rgba(15,17,21,0.8);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ===== NAVBAR ===== */
  .navbar {
    position: sticky;
    top: 16px;
    z-index: 100;
    max-width: 1200px;
    margin: 16px auto 0;
    padding: 14px 24px;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .navbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .navbar-logo {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    object-fit: cover;
  }

  .navbar-title {
    font-weight: 700;
    font-size: 18px;
    color: #111111 !important;
    letter-spacing: -0.3px;
  }

  .navbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: 0.25s ease;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--shadow);
    border-color: var(--accent);
  }

  .theme-toggle {
    font-size: 16px;
  }

  .plus-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: 0.25s ease;
    box-shadow: 0 4px 14px var(--shadow-accent);
  }
  .plus-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px var(--shadow-accent);
  }

  /* ===== HERO ===== */
  .hero {
    max-width: 1200px;
    margin: 80px auto 60px;
    padding: 0 24px;
    text-align: center;
  }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(90deg, #ff7a00, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 1.1rem;
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .week-banner {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 10px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    color: var(--text-secondary);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .week-banner span.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  /* ===== LAYOUT ===== */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .content {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    padding-bottom: 80px;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    min-width: 220px;
    max-width: 260px;
    flex: 0 0 auto;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .sidebar-header h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .folder-count {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 8px;
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 8px 24px var(--shadow);
    display: flex;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: 0.25s ease;
    margin-bottom: 12px;
  }
  [data-theme="dark"] .card {
    border-color: var(--border);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px var(--shadow);
    border-color: var(--accent);
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    display: grid;
    place-items: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .options-btn {
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-secondary);
    transition: 0.25s ease;
    line-height: 1;
  }
  .options-btn:hover {
    background: var(--border);
    color: var(--text);
  }

  .folder-badge {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 6px;
  }

  /* ===== SHORTCUTS GRID ===== */
  .main-section { flex: 1 1 auto; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .cards-grid .card { margin-bottom: 0; }

  /* ===== OVERLAY ===== */
  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 1000;
  }
  .overlay.show {
    display: grid;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .dialog {
    width: min(560px, 94vw);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .dialog-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 20px;
  }

  /* ===== FORMS ===== */
  .form-row {
    margin-bottom: 12px;
  }

  .form-row input[type="text"],
  .form-row input[type="url"],
  .form-row input[type="password"],
  .form-row textarea,
  .form-row select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: 0.25s ease;
  }
  .form-row input:focus,
  .form-row textarea:focus,
  .form-row select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,122,0,0.15);
  }

  .form-row textarea {
    min-height: 90px;
    resize: vertical;
  }

  .form-row select option {
    background: var(--card);
    color: var(--text);
  }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s ease;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--shadow);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    box-shadow: 0 4px 14px var(--shadow-accent);
  }
  .btn-primary:hover {
    box-shadow: 0 10px 25px var(--shadow-accent);
  }

  .btn-danger {
    background: var(--danger);
    color: white;
    border: none;
  }

  .dialog-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ===== FLOAT MENU ===== */
  .float-menu {
    position: fixed;
    display: none;
    z-index: 1200;
    background: var(--card);
    border-radius: 14px;
    padding: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 16px 40px rgba(0,0,0,0.16);
    min-width: 200px;
    transition: opacity 0.12s;
  }

  .float-menu button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 11px 14px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.15s ease;
  }
  .float-menu button:first-child {
    font-weight: 700;
    color: var(--accent);
  }
  .float-menu button:hover {
    background: var(--bg);
    transform: translateY(-1px);
  }
  .float-menu button.cancel {
    color: var(--text-secondary);
  }
  .float-menu button.danger {
    color: var(--danger);
  }

  /* ===== ADMIN PILL ===== */
  .admin-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,122,0,0.1);
    border: 1px solid rgba(255,122,0,0.3);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }

  footer .sync-status {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.7;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 700px) {
    .navbar { top: 8px; margin: 8px 12px 0; padding: 12px 16px; }
    .hero { margin: 48px auto 40px; }
    .content { flex-direction: column; }
    .sidebar { min-width: 100%; max-width: 100%; order: 2; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* ===== USER CODE DISPLAY ===== */
  .code-display {
    background: var(--bg);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--accent);
    margin: 12px 0;
  }

  /* ===== FOLDER CONTENTS ===== */
  .folder-contents {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
    max-height: 320px;
    overflow-y: auto;
  }

  .folder-contents .card {
    margin-bottom: 0;
  }
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <a class="navbar-brand" href="#">
    <img class="navbar-logo" src="https://raw.githubusercontent.com/lamacOs/lamacos.github.io/refs/heads/main/logo.png" alt="lamacOs Logo">
    <span class="navbar-title">lamacOs</span>
  </a>
  <div class="navbar-right">
    <span id="adminStatus"></span>
    <button class="icon-btn theme-toggle" id="themeToggle" title="Design wechseln">☀️</button>
    <button class="icon-btn" id="userIcon" title="Benutzerprofil">👤</button>
    <button class="plus-btn" id="plusBtn" title="Neu">+</button>
  </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
  <h1>Kurzbefehle</h1>
  <p>iOS Kurzbefehle mit anderen teilen, in Ordnern organisieren und sicher sperren.</p>
  <div class="week-banner">
    <span class="dot"></span>
    <span id="weekSatz">Kleine Schritte führen zu großen Veränderungen.</span>
  </div>
</section>

<!-- ===== MAIN CONTENT ===== -->
<div class="container">
  <div class="content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Ordner</h3>
        <span class="folder-count" id="folderCount">0</span>
      </div>
      <div id="folderList"></div>
    </aside>

    <!-- Shortcuts -->
    <main class="main-section">
      <div class="section-header">
        <h2>Meine Kurzbefehle</h2>
      </div>
      <div class="cards-grid" id="cardGrid"></div>
    </main>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
  <div>© 2026 lamacHub</div>
  <div class="sync-status">Sync: <span id="syncStatus">Nicht verbunden</span></div>
</footer>

<!-- ===== OVERLAY ===== -->
<div class="overlay" id="overlay">
  <div class="dialog" id="dialogContent"></div>
</div>

<!-- ===== FLOAT MENUS ===== -->
<div class="float-menu" id="floatMenu"></div>
<div class="float-menu" id="folderMenu"></div>

<!-- Firebase compat SDKs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-database-compat.min.js"></script>

<script>
// ---- FIREBASE CONFIG ----
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAncU4-dwtemjWWTg8gIEA1WcAOeI_d87A",
  authDomain: "lamacos-kurzbefehle.firebaseapp.com",
  databaseURL: "https://lamacos-kurzbefehle-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lamacos-kurzbefehle",
  storageBucket: "lamacos-kurzbefehle.firebasestorage.app",
  messagingSenderId: "418008463025",
  appId: "1:418008463025:web:db9be0883fae1470d0d490"
};

const ADMIN_PASSWORD = "123.lamacosadminadminlamacos123";
const ADMIN_DURATION_MS = 30 * 60 * 1000;
const STORAGE_KEY = 'lamacos.shortcuts.v1';

// === Helpers ===
function uid(prefix='id'){ return prefix + '_' + Math.random().toString(36).slice(2,10); }
function escapeHtml(s=''){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function normalizeState(s){
  if(!s) return {shortcuts:[], folders:[], meta:{lastUpdated:0,lastWriter:null}};
  if(!s.shortcuts) s.shortcuts = [];
  if(!s.folders) s.folders = [];
  if(!s.meta) s.meta = {lastUpdated:0, lastWriter:null};
  return s;
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {shortcuts:[], folders:[], meta:{lastUpdated:0,lastWriter:null}};
    return normalizeState(JSON.parse(raw));
  }catch(e){ return {shortcuts:[], folders:[], meta:{lastUpdated:0,lastWriter:null}}; }
}
async function sha256hex(str){
  const enc = new TextEncoder().encode(str||'');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// === State ===
let userId = localStorage.getItem("lamacosUserId");
let currentUsername = '';
let state = loadLocal();
let firebaseEnabled=false, firebaseApp=null, firebaseAuth=null, firebaseDb=null, currentUid=null;
let adminMode = false, adminExpiresAt = 0;

// === DOM ===
const cardGrid = document.getElementById('cardGrid');
const folderList = document.getElementById('folderList');
const folderCount = document.getElementById('folderCount');
const overlay = document.getElementById('overlay');
const dialogContent = document.getElementById('dialogContent');
const floatMenu = document.getElementById('floatMenu');
const folderMenu = document.getElementById('folderMenu');
const plusBtn = document.getElementById('plusBtn');
const syncStatusEl = document.getElementById('syncStatus');
const adminStatusEl = document.getElementById('adminStatus');

// === Theme Toggle ===
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('lamacosTheme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
themeToggle.addEventListener('click', ()=>{
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('lamacosTheme', next);
});

// === Admin ===
function setAdminMode(on){
  adminMode = !!on;
  if(adminMode){
    adminExpiresAt = Date.now() + ADMIN_DURATION_MS;
    adminStatusEl.innerHTML = '<span class="admin-pill">⚡ Admin aktiv</span>';
  } else {
    adminExpiresAt = 0;
    adminStatusEl.innerHTML = '';
  }
}
function checkAdminExpiry(){
  if(adminMode && Date.now() > adminExpiresAt){ setAdminMode(false); render(); }
}
setInterval(checkAdminExpiry, 1000);

function saveLocal(){
  state.meta = state.meta || {};
  state.meta.lastUpdated = Date.now();
  state.meta.lastWriter = currentUid || 'local';
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function setSyncStatus(txt){ if(syncStatusEl) syncStatusEl.textContent = txt; }

// === User Auth ===
function setupUserAuth(){
  if(!userId){
    userId = (Date.now().toString(36).substring(2,8) + Math.random().toString(36).substring(2,6)).toUpperCase();
    localStorage.setItem("lamacosUserId", userId);
  }
  currentUsername = userId;
  initFirebaseAuthAndSync();
}

function openUserMenu(){
  showDialog(`
    <div class="dialog-title">Dein Benutzer-Code</div>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">Mit diesem Code kannst du deine Shortcuts auf anderen Geräten bearbeiten.</p>
    <div class="code-display">${userId}</div>
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">Tipp: Speichere diesen Code für andere Geräte.</p>
    <div class="dialog-actions">
      <button class="btn" id="changeCodeBtn">Code ändern</button>
      <button class="btn btn-primary" id="closeUserMenuBtn">Schließen</button>
    </div>
  `);
  document.getElementById('closeUserMenuBtn').addEventListener('click', hideDialog);
  document.getElementById('changeCodeBtn').addEventListener('click', ()=>{ hideDialog(); setTimeout(changeUserCode, 100); });
}

function changeUserCode(){
  showDialog(`
    <div class="dialog-title">Code ändern</div>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">Gib einen Code von einem anderen Gerät ein.</p>
    <div class="form-row">
      <input type="text" id="newCodeInput" placeholder="Neuer Code" style="text-transform:uppercase;letter-spacing:3px;text-align:center;font-weight:700;font-size:18px;">
    </div>
    <div class="dialog-actions">
      <button class="btn" id="cancelChangeCode">Abbrechen</button>
      <button class="btn btn-primary" id="saveNewCode">Speichern</button>
    </div>
  `);
  const input = document.getElementById('newCodeInput');
  input.focus();
  document.getElementById('cancelChangeCode').addEventListener('click', hideDialog);
  document.getElementById('saveNewCode').addEventListener('click', ()=>{
    const newCode = input.value.trim().toUpperCase();
    if(!newCode){ alert('Bitte gib einen Code ein'); return; }
    userId = newCode; currentUsername = newCode;
    localStorage.setItem("lamacosUserId", userId);
    location.reload();
  });
}

// === Firebase ===
function initFirebaseAuthAndSync(){
  if(typeof firebase === 'undefined'){ setSyncStatus('Firebase SDK fehlt'); return; }
  if(!FIREBASE_CONFIG?.apiKey){ setSyncStatus('Firebase nicht konfiguriert'); return; }
  try{
    if(!firebaseApp) firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    firebaseAuth = firebase.auth();
    if(!firebaseDb) firebaseDb = firebase.database();
    firebaseEnabled = true;
    setSyncStatus('Verbinde…');

    firebaseAuth.signInAnonymously()
      .then(userCred=>{
        currentUid = userCred.user.uid;
        setSyncStatus('Verbunden');
        const rootRef = firebaseDb.ref('lamacos_shared_state');

        rootRef.on('value', (snap)=>{
          const cloud = snap.val();
          if(!cloud) return;
          const cloudMeta = cloud.meta || { lastUpdated:0 };
          const localMeta = state.meta || { lastUpdated:0 };
          if(cloudMeta.lastUpdated > localMeta.lastUpdated){
            state = normalizeState(cloud); saveLocal(); render();
            setSyncStatus('Synchronisiert');
          } else if(cloudMeta.lastUpdated < localMeta.lastUpdated){
            pushStateToCloud(state);
          } else { setSyncStatus('Synchronisiert'); }
        });

        rootRef.once('value').then(snapshot=>{
          const cloudOnce = snapshot.val();
          if(cloudOnce){
            const cloudMeta = cloudOnce.meta || { lastUpdated:0 };
            if(cloudMeta.lastUpdated > (state.meta?.lastUpdated||0)){
              state = normalizeState(cloudOnce); saveLocal(); render(); setSyncStatus('Synchronisiert');
            } else if(cloudMeta.lastUpdated < (state.meta?.lastUpdated||0)){
              pushStateToCloud(state).then(()=>setSyncStatus('Synchronisiert'));
            } else setSyncStatus('Synchronisiert');
          } else {
            localStorage.clear();
            state = {shortcuts:[], folders:[], meta:{lastUpdated:0,lastWriter:null}};
            render(); setSyncStatus('Bereit');
          }
        });
      })
      .catch(err=>{ setSyncStatus('Auth Fehler: ' + (err.message||'Unbekannt')); });
  }catch(e){ firebaseEnabled=false; setSyncStatus('Init Fehler'); }
}

function pushStateToCloud(s){
  if(!firebaseEnabled) return Promise.resolve();
  const toPush = JSON.parse(JSON.stringify(s));
  toPush.meta = toPush.meta || {};
  toPush.meta.lastUpdated = Date.now();
  toPush.meta.lastWriter = currentUid || 'local';
  return firebaseDb.ref('lamacos_shared_state').set(toPush)
    .then(()=>{ state.meta = toPush.meta; saveLocal(); setSyncStatus('Zuletzt: ' + new Date(state.meta.lastUpdated).toLocaleTimeString()); })
    .catch(()=>{ setSyncStatus('Push fehlgeschlagen'); });
}

// === UI ===
function showDialog(html){ dialogContent.innerHTML = html; overlay.classList.add('show'); }
function hideDialog(){ overlay.classList.remove('show'); floatMenu.style.display='none'; folderMenu.style.display='none'; }

document.addEventListener('click', (e)=>{
  if(!floatMenu.contains(e.target) && e.target !== plusBtn && !e.target.closest('.options-btn')) floatMenu.style.display='none';
  if(!folderMenu.contains(e.target)) folderMenu.style.display='none';
});

// === Render ===
function render(){
  state = normalizeState(state);
  cardGrid.innerHTML = '';

  if(state.shortcuts.length === 0){
    cardGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary);">
      <div style="font-size:40px;margin-bottom:12px">🔗</div>
      <div style="font-weight:600;margin-bottom:8px;color:var(--text)">Noch keine Kurzbefehle</div>
      <div style="font-size:14px">Klicke auf + um deinen ersten Kurzbefehl hinzuzufügen.</div>
    </div>`;
  }

  state.shortcuts.forEach(sc=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = sc.id;
    const isOwner = sc.ownerId === userId || adminMode;

    el.innerHTML = `
      <div class="card-icon">${sc.icon || '🔗'}</div>
      <div class="card-meta">
        <div class="card-name">${escapeHtml(sc.name)}</div>
        <div class="card-desc">${escapeHtml(sc.description || sc.link || '')}</div>
      </div>
      <div class="card-right">
        ${isOwner ? '<div class="options-btn" title="Optionen">⋯</div>' : ''}
        ${sc.folderId ? `<div class="folder-badge">📁 ${escapeHtml(getFolderName(sc.folderId)||'')}</div>` : ''}
      </div>
    `;

    el.addEventListener('click', (e)=>{
      if(e.target.closest('.options-btn')) return;
      if(sc.link) window.open(sc.link, '_blank');
    });

    if(isOwner){
      const optBtn = el.querySelector('.options-btn');
      if(optBtn) optBtn.addEventListener('click', (e)=>{ e.stopPropagation(); openShortcutMenuAtElement(el, sc); });
      addLongPress(el, ()=> openShortcutMenuAtElement(el, sc));
    }

    cardGrid.appendChild(el);
  });

  folderList.innerHTML = '';
  if(state.folders.length === 0){
    folderList.innerHTML = `<div style="text-align:center;padding:24px 12px;color:var(--text-secondary);font-size:13px;">
      <div style="margin-bottom:6px">📁</div>Noch keine Ordner
    </div>`;
  }

  state.folders.forEach(f=>{
    const fe = document.createElement('div');
    fe.className = 'card';
    fe.dataset.id = f.id;
    const isOwner = f.ownerId === userId || adminMode;

    fe.innerHTML = `
      <div class="card-icon">📁</div>
      <div class="card-meta">
        <div class="card-name">${escapeHtml(f.name)} ${f.locked ? '🔒' : ''}</div>
        <div class="card-desc">${(f.items?.length||0)} Kurzbefehle</div>
      </div>
      <div class="card-right">
        ${isOwner ? '<div class="options-btn" title="Optionen">⋯</div>' : ''}
      </div>
    `;

    fe.addEventListener('click', ()=> openFolder(f.id));
    if(isOwner){
      const opt = fe.querySelector('.options-btn');
      if(opt) opt.addEventListener('click', (e)=>{ e.stopPropagation(); openFolderMenuAtElement(fe, f); });
      addLongPress(fe, ()=> openFolderMenuAtElement(fe, f));
    }

    folderList.appendChild(fe);
  });

  folderCount.textContent = state.folders.length;
}

function addLongPress(el, callback){
  let timer = null;
  el.addEventListener('mousedown', ()=> timer = setTimeout(callback, 500));
  el.addEventListener('mouseup', ()=> { if(timer) clearTimeout(timer); });
  el.addEventListener('mouseleave', ()=> { if(timer) clearTimeout(timer); });
  el.addEventListener('touchstart', ()=> timer = setTimeout(callback, 600));
  el.addEventListener('touchend', ()=> { if(timer) clearTimeout(timer); });
}

// === Menus ===
function openShortcutMenuAtElement(el, sc){
  floatMenu.innerHTML = '';
  addMenuOption(floatMenu, '✏️ Bearbeiten', ()=>{ floatMenu.style.display='none'; openShortcutDialog(sc); });
  addMenuOption(floatMenu, sc.folderId ? '📤 Aus Ordner entfernen' : '📁 Zu Ordner verschieben', ()=>{
    floatMenu.style.display='none';
    if(sc.folderId) moveShortcutToFolder(sc.id, null);
    else showFolderPickerForShortcut(sc);
  });
  addMenuOption(floatMenu, '🗑️ Löschen', ()=>{ floatMenu.style.display='none'; deleteShortcut(sc.id); }, true);
  addMenuOption(floatMenu, 'Abbrechen', ()=>{ floatMenu.style.display='none'; }, false, true);
  positionMenu(floatMenu, el);
}

function openFolderMenuAtElement(el, f){
  folderMenu.innerHTML = '';
  addMenuOption(folderMenu, '✏️ Bearbeiten', ()=>{ folderMenu.style.display='none'; openFolderDialog(f); });
  if(!f.locked) addMenuOption(folderMenu, '🔒 Sperren', ()=>{ folderMenu.style.display='none'; lockFolder(f); });
  else addMenuOption(folderMenu, '🔓 Entsperren', ()=>{ folderMenu.style.display='none'; unlockFolder(f); });
  addMenuOption(folderMenu, '🗑️ Löschen', ()=>{ folderMenu.style.display='none'; deleteFolder(f.id); }, true);
  addMenuOption(folderMenu, 'Abbrechen', ()=>{ folderMenu.style.display='none'; }, false, true);
  positionMenu(folderMenu, el);
}

function positionMenu(menuEl, el){
  menuEl.style.display = 'block';
  const rect = el.getBoundingClientRect();
  requestAnimationFrame(()=>{
    const w = menuEl.offsetWidth;
    menuEl.style.top = (rect.bottom + 8) + 'px';
    menuEl.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - w - 8)) + 'px';
  });
}

function addMenuOption(menuEl, text, fn, danger=false, cancel=false){
  const btn = document.createElement('button');
  btn.textContent = text;
  if(cancel) btn.className = 'cancel';
  if(danger) btn.classList.add('danger');
  btn.addEventListener('click', fn);
  menuEl.appendChild(btn);
}

// === Dialogs ===
function openShortcutDialog(sc=null){
  const isNew = !sc;
  const id = isNew ? uid() : sc.id;
  const folderOptions = state.folders.map(f=>`<option value="${f.id}" ${sc?.folderId===f.id?'selected':''}>${escapeHtml(f.name)}</option>`).join('');
  showDialog(`
    <div class="dialog-title">${isNew ? 'Neuer Kurzbefehl' : 'Kurzbefehl bearbeiten'}</div>
    <div class="form-row"><input type="text" id="scName" placeholder="Name" value="${sc?escapeHtml(sc.name):''}"></div>
    <div class="form-row"><input type="text" id="scIcon" placeholder="Icon (Emoji)" value="${sc?escapeHtml(sc.icon):''}"></div>
    <div class="form-row"><input type="url" id="scLink" placeholder="Kurzbefehl-Link" value="${sc?escapeHtml(sc.link):''}"></div>
    <div class="form-row"><textarea id="scDesc" placeholder="Beschreibung (optional)">${sc?escapeHtml(sc.description):''}</textarea></div>
    <div class="form-row">
      <select id="scFolder">
        <option value="">Kein Ordner</option>
        ${folderOptions}
      </select>
    </div>
    <div class="dialog-actions">
      <button class="btn" id="scCancel">Abbrechen</button>
      <button class="btn btn-primary" id="scSave">Speichern</button>
    </div>
  `);
  document.getElementById('scCancel').addEventListener('click', hideDialog);
  document.getElementById('scSave').addEventListener('click', ()=>{
    const name = document.getElementById('scName').value.trim();
    const icon = document.getElementById('scIcon').value.trim();
    const link = document.getElementById('scLink').value.trim();
    const desc = document.getElementById('scDesc').value.trim();
    const folderId = document.getElementById('scFolder').value || null;
    if(!name) return alert('Name ist Pflicht');

    if(isNew) state.shortcuts.push({ id, name, icon, link, description: desc, folderId, ownerId: userId });
    else { const s = state.shortcuts.find(x=>x.id===id); if(s){ s.name=name; s.icon=icon; s.link=link; s.description=desc; s.folderId=folderId; } }

    state.folders.forEach(f=>{ f.items=(f.items||[]).filter(i=>i!==id); });
    if(folderId){ const target = state.folders.find(f=>f.id===folderId); if(target){ target.items=target.items||[]; target.items.push(id); } }

    saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render(); hideDialog();
  });
}

function openFolderDialog(f=null){
  const isNew = !f;
  showDialog(`
    <div class="dialog-title">${isNew ? 'Neuer Ordner' : 'Ordner bearbeiten'}</div>
    <div class="form-row"><input type="text" id="fName" placeholder="Ordnername" value="${f?escapeHtml(f.name):''}"></div>
    <div class="dialog-actions">
      <button class="btn" id="fCancel">Abbrechen</button>
      <button class="btn btn-primary" id="fSave">Speichern</button>
    </div>
  `);
  document.getElementById('fCancel').addEventListener('click', hideDialog);
  document.getElementById('fSave').addEventListener('click', ()=>{
    const name = document.getElementById('fName').value.trim();
    if(!name) return alert('Name ist Pflicht');
    if(isNew) state.folders.push({ id: uid(), name, items: [], locked:false, pwHash:null, ownerId: userId });
    else f.name = name;
    saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render(); hideDialog();
  });
}

// === Folders ===
async function openFolder(id){
  const f = state.folders.find(x=>x.id===id);
  if(!f) return;
  if(f.locked && adminMode){ showFolderContents(f); return; }
  if(f.locked){ const ok = await promptFolderPassword(f); if(!ok) return; }
  showFolderContents(f);
}

function showFolderContents(f){
  const items = (f.items||[]).map(id=>{
    const sc = state.shortcuts.find(s=>s.id===id);
    if(!sc) return '';
    return `<div class="card folder-card" data-id="${sc.id}">
      <div class="card-icon">${sc.icon||'🔗'}</div>
      <div class="card-meta">
        <div class="card-name">${escapeHtml(sc.name)}</div>
        <div class="card-desc">${escapeHtml(sc.description||sc.link||'')}</div>
      </div>
    </div>`;
  }).join('');

  showDialog(`
    <div class="dialog-title">📁 ${escapeHtml(f.name)} ${adminMode ? '— Admin' : ''}</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${f.items?.length||0} Kurzbefehle</p>
    <div class="folder-contents">${items || '<div style="text-align:center;padding:24px;color:var(--text-secondary);font-size:13px;">Ordner ist leer</div>'}</div>
    <div class="dialog-actions">
      <button class="btn btn-primary" id="closeFolderBtn">Schließen</button>
    </div>
  `);

  (f.items||[]).forEach(id=>{
    const el = dialogContent.querySelector(`.folder-card[data-id="${id}"]`);
    const sc = state.shortcuts.find(s=>s.id===id);
    if(el && sc){
      el.addEventListener('click', ()=>{ if(sc.link) window.open(sc.link, '_blank'); });
      if(sc.ownerId === userId || adminMode) addLongPress(el, ()=> openShortcutMenuAtElement(el, sc));
    }
  });

  document.getElementById('closeFolderBtn').addEventListener('click', hideDialog);
}

function promptFolderPassword(f){
  return new Promise(resolve=>{
    showDialog(`
      <div class="dialog-title">🔒 ${escapeHtml(f.name)}</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">Passwort zum Öffnen dieses Ordners eingeben.</p>
      <div class="form-row">
        <input id="folderPwInput" type="password" placeholder="Passwort">
      </div>
      <div class="dialog-actions">
        <button class="btn" id="folderPwCancel">Abbrechen</button>
        <button class="btn btn-primary" id="folderPwOk">Öffnen</button>
      </div>
    `);
    document.getElementById('folderPwInput').focus();
    document.getElementById('folderPwCancel').addEventListener('click', ()=>{ hideDialog(); resolve(false); }, {once:true});
    document.getElementById('folderPwOk').addEventListener('click', async ()=>{
      const pw = document.getElementById('folderPwInput').value || '';
      if(pw === ADMIN_PASSWORD){ setAdminMode(true); hideDialog(); alert('Admin-Modus aktiviert ✅'); render(); resolve(true); return; }
      const hash = await sha256hex(pw);
      if(hash === f.pwHash){ hideDialog(); resolve(true); }
      else { hideDialog(); alert('Falsches Passwort'); resolve(false); }
    }, {once:true});
  });
}

function lockFolder(f){
  const pw = prompt('Neues Passwort für Ordner:');
  if(!pw) return;
  sha256hex(pw).then(hash=>{ f.pwHash=hash; f.locked=true; saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render(); });
}

function unlockFolder(f){
  if(adminMode){ f.locked=false; f.pwHash=null; saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render(); alert('Entsperrt ✅'); return; }
  const pw = prompt('Passwort zum Entsperren:');
  if(!pw) return;
  sha256hex(pw).then(hash=>{ if(hash===f.pwHash){ f.locked=false; saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render(); } else alert('Falsches Passwort'); });
}

function deleteFolder(folderId){
  state.folders = state.folders.filter(x=>x.id!==folderId);
  state.shortcuts.forEach(s=>{ if(s.folderId===folderId) s.folderId=null; });
  saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render();
}

function moveShortcutToFolder(scId, folderId){
  state.folders.forEach(f=>{ f.items=(f.items||[]).filter(i=>i!==scId); });
  const sc = state.shortcuts.find(s=>s.id===scId);
  if(sc) sc.folderId = folderId || null;
  if(folderId){ const folder = state.folders.find(f=>f.id===folderId); if(folder){ folder.items=folder.items||[]; folder.items.push(scId); } }
  saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render();
}

function showFolderPickerForShortcut(sc){
  const options = state.folders.map(f=>`<button class="pickFolderBtn btn" data-id="${f.id}" style="width:100%;text-align:left;margin-bottom:8px">📁 ${escapeHtml(f.name)}</button>`).join('');
  showDialog(`
    <div class="dialog-title">Verschieben nach…</div>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">"${escapeHtml(sc.name)}"</p>
    <div style="display:flex;flex-direction:column;">${options}</div>
    <div class="dialog-actions">
      <button class="btn" id="pickCancel">Abbrechen</button>
    </div>
  `);
  dialogContent.querySelectorAll('.pickFolderBtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ moveShortcutToFolder(sc.id, btn.dataset.id); hideDialog(); });
  });
  document.getElementById('pickCancel').addEventListener('click', hideDialog);
}

function deleteShortcut(scId){
  state.shortcuts = state.shortcuts.filter(s=>s.id!==scId);
  state.folders.forEach(f=> f.items=(f.items||[]).filter(i=>i!==scId));
  saveLocal(); if(firebaseEnabled) pushStateToCloud(state); render();
}

function getFolderName(folderId){
  const f = state.folders.find(x=>x.id===folderId);
  return f ? f.name : '';
}

// === Bindings ===
document.getElementById('userIcon').addEventListener('click', openUserMenu);
plusBtn.addEventListener('click', ()=>{
  floatMenu.innerHTML = '';
  addMenuOption(floatMenu, '🔗 Neuer Kurzbefehl', ()=>{ floatMenu.style.display='none'; openShortcutDialog(); });
  addMenuOption(floatMenu, '📁 Neuer Ordner', ()=>{ floatMenu.style.display='none'; openFolderDialog(); });
  addMenuOption(floatMenu, 'Abbrechen', ()=>{ floatMenu.style.display='none'; }, false, true);
  positionMenu(floatMenu, plusBtn);
});
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ hideDialog(); floatMenu.style.display='none'; folderMenu.style.display='none'; } });

// === Init ===
render();
setupUserAuth();

window.openShortcutDialog = openShortcutDialog;
window.openFolderDialog = openFolderDialog;
window.openFolder = openFolder;
window.hideDialog = hideDialog;
</script>
</body>
</html>
