<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksrad</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#111;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.pointer{
    font-size:60px;
    color:white;
    margin-bottom:-10px;
    z-index:10;
}

#wheel{
    width:350px;
    height:350px;
    border-radius:50%;
    border:8px solid white;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform 5s cubic-bezier(.17,.67,.17,1);
}

.red-half{
    position:absolute;
    left:0;
    top:0;
    width:50%;
    height:100%;
    background:#e53935;
}

.green-half{
    position:absolute;
    right:0;
    top:0;
    width:50%;
    height:100%;
    background:#43a047;
}

.label{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    color:white;
    font-size:34px;
    font-weight:bold;
    user-select:none;
}

.niete{
    left:35px;
}

.win{
    right:55px;
}

#result{
    margin-top:40px;
    color:white;
    font-size:70px;
    font-weight:bold;
    opacity:0;
    transition:0.5s;
}
</style>
</head>
<body>

<div class="pointer">▼</div>

<div id="wheel">
    <div class="red-half"></div>
    <div class="green-half"></div>

    <div class="label niete">NIETE</div>
    <div class="label win">WIN</div>
</div>

<div id="result"></div>

<script>
const wheel = document.getElementById("wheel");
const result = document.getElementById("result");

let spinning = false;
let currentRotation = 0;

wheel.addEventListener("click", () => {

    if (spinning) return;

    spinning = true;
    result.style.opacity = "0";

    // Zufällige Anzahl voller Drehungen
    const spins = 8 + Math.floor(Math.random() * 6);

    // Endet immer so, dass die rote NIETE-Seite oben beim Pfeil ist
    const finalAngle = 90;

    currentRotation += spins * 360 + finalAngle;

    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
        result.textContent = "NIETE";
        result.style.opacity = "1";
        spinning = false;
    }, 5000);
});
</script>

</body>
</html>
