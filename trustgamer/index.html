<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TrustGamer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {margin:0;font-family:system-ui,sans-serif;background:#0b0b0b;color:#fff;}
header{display:flex;justify-content:space-between;padding:15px;background:#111;}
button{background:#00ffcc;border:none;padding:10px 14px;border-radius:8px;font-weight:bold;cursor:pointer;}
input,textarea,select{width:100%;margin:6px 0;padding:8px;border-radius:6px;border:none;}
section{padding:15px;}
.card{background:#161616;padding:12px;border-radius:10px;margin-bottom:10px;}
.hidden{display:none;}
.tag{display:inline-block;background:#00ffcc;color:#000;padding:3px 7px;border-radius:6px;font-size:12px;margin-right:4px;}
#mini{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
</style>
</head>
<body>

<header>
  <button onclick="toggleDev()">🧪 Entwickler</button>
  <button onclick="toggleSignup()">Eintragen</button>
</header>

<section id="main">
  <input placeholder="🔍 Gamer suchen…" oninput="search(this.value)">
  <div id="list"></div>
</section>

<section id="signup" class="hidden">
  <h2>Eintragen</h2>
  <input id="email" placeholder="E-Mail">
  <input id="age" placeholder="Alter" type="number">
  <input id="gamer" placeholder="Gamername">
  <input id="game" placeholder="Spiel">

  <h3>Fragebogen</h3>

  <label>Wie lange spielst du schon aktiv Games?</label>
  <select id="years">
    <option value="2">Unter 1 Jahr</option>
    <option value="5">1–3 Jahre</option>
    <option value="10">3–6 Jahre</option>
    <option value="15">6+ Jahre</option>
  </select>

  <label>Was ist dir beim Zocken am wichtigsten? (Komma getrennt)</label>
  <input id="importance" placeholder="z.B. Fair Play, Teamplay, Spaß">

  <label>Was machst du, wenn jemand Fehler macht?</label>
  <select id="reaction">
    <option value="15">Helfen</option>
    <option value="5">Ignorieren</option>
    <option value="-30">Beleidigen</option>
  </select>

  <label>Hast du schon mal Cheats benutzt?</label>
  <select id="cheats">
    <option value="20">Nein</option>
    <option value="-10">Einmal aus Neugier</option>
    <option value="-40">Ja, öfter</option>
  </select>

  <label>Welche Rolle spielst du am liebsten?</label>
  <select id="role">
    <option value="10">Support/Heiler</option>
    <option value="5">Damage Dealer</option>
    <option value="5">Tank</option>
    <option value="0">Nur PvP</option>
    <option value="-10">Anderes (toxisch)</option>
  </select>

  <label>Wie reagierst du, wenn dein Team verliert?</label>
  <select id="teamLoss">
    <option value="10">Fair bleiben</option>
    <option value="-5">Meckern</option>
    <option value="-20">Andere beleidigen</option>
  </select>

  <label>Freitext: Warum solltest du aufgenommen werden?</label>
  <textarea id="text" placeholder="Schreibe hier…"></textarea>

  <button onclick="submit()">Absenden</button>
</section>

<section id="dev" class="hidden">
  <h2>Entwickler-Modus</h2>
  <select id="lang">
    <option>JavaScript</option>
    <option>C# (Unity)</option>
    <option>Java</option>
  </select>
  <button onclick="genCode()">Code generieren</button>
  <pre id="code"></pre>
</section>

<div id="mini" class="hidden">
  <div class="card" id="miniCard"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ⚡ Ersetze mit deinen Firebase Daten
const firebaseConfig = {apiKey: "AIzaSyArPBdSmaqqQpqITjs3iCKvY8hxDQg5qFQ",
    authDomain: "jump-and-run-f58e2.firebaseapp.com",
    databaseURL: "https://jump-and-run-f58e2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jump-and-run-f58e2",
    storageBucket: "jump-and-run-f58e2.firebasestorage.app",
    messagingSenderId: "1093030272732",
    appId: "1:1093030272732:web:4939ea7a726c69ba78de19",
    measurementId: "G-HM07HRVX34"};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const usersRef = collection(db, "users");

// DOM Elemente
const gamer = document.getElementById("gamer");
const game = document.getElementById("game");
const years = document.getElementById("years");
const reaction = document.getElementById("reaction");
const cheats = document.getElementById("cheats");
const role = document.getElementById("role");
const teamLoss = document.getElementById("teamLoss");
const importanceInput = document.getElementById("importance");
const textInput = document.getElementById("text");

window.toggleSignup = () => document.getElementById("signup").classList.toggle("hidden");
window.toggleDev = () => document.getElementById("dev").classList.toggle("hidden");

window.submit = async () => {
  let score = 0;
  score += +years.value;
  score += +reaction.value;
  score += +cheats.value;
  score += +role.value;
  score += +teamLoss.value;

  // Wichtigkeit-Multiple-Choice
  let importance = importanceInput.value.toLowerCase().split(",");
  importance.forEach(i => {
    if(i.includes("fair")) score += 10;
    if(i.includes("team")) score += 10;
    if(i.includes("spaß") || i.includes("spass")) score += 5;
    if(i.includes("gewinnen")) score -= 5;
    if(i.includes("beleidigen")) score -= 20;
  });

  // Freitext-Check
  let text = textInput.value.toLowerCase();
  if(text.length > 150) score += 10;
  ["team","fair","spaß","respekt"].forEach(w => { if(text.includes(w)) score += 5; });
  ["hacken","cheaten","toxic"].forEach(w => { if(text.includes(w)) score -= 10; });

  let result = score >= 70 ? "approved" : (score >= 40 ? "pending" : "rejected");

  try {
    await addDoc(usersRef, {
      gamer: gamer.value,
      game: game.value,
      score,
      result,
      tags: result==="approved"?["Fair","Teamplayer"]:[]
    });
    alert("Danke! Ergebnis: " + result);
    location.reload();
  } catch(e) {
    alert("Fehler beim Speichern: " + e.message);
  }
};

// Alle approved Gamer laden
async function load() {
  const q = query(usersRef, where("result","==","approved"));
  const snap = await getDocs(q);
  snap.forEach(doc => {
    let u = doc.data();
    list.innerHTML += `<div class="card"><b>${u.gamer}</b> – ${u.game}<br>${u.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`;
  });
}

// Suche
window.search = async (v) => {
  list.innerHTML = "";
  const snap = await getDocs(usersRef);
  snap.forEach(doc => {
    let u = doc.data();
    if(u.result==="approved" && u.gamer.toLowerCase().includes(v.toLowerCase())){
      list.innerHTML += `<div class="card">${u.gamer}</div>`;
    }
  });
};

// Entwickler-Modus
window.genCode = () => {
  let l = lang.value;
  let code = l==="JavaScript"
    ? `window.open("https://trustgamer.gg?mini=1&player=NAME");`
    : l==="C# (Unity)"
    ? `Application.OpenURL("https://trustgamer.gg?mini=1&player=" + playerName);`
    : `Desktop.getDesktop().browse(new URI("https://trustgamer.gg?mini=1&player="+name));`;
  document.getElementById("code").innerText = code;
};

// Mini Overlay
const url = new URLSearchParams(location.search);
if(url.get("mini")){
  document.body.innerHTML="";
  document.getElementById("mini").classList.remove("hidden");
  const snap = await getDocs(usersRef);
  snap.forEach(doc => {
    let u = doc.data();
    if(u.gamer===url.get("player")){
      miniCard.innerHTML = `<h2>${u.gamer}</h2><p>${u.result==="approved"?"✅ Vertrauenswürdig":"⏳ Unbekannt"}</p><p>Score: ${u.score}</p>`;
    }
  });
}

// Seite laden
load();

</script>
</body>
</html>
