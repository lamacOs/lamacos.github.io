<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Network</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin: 0 10px;
  cursor: pointer;
  text-decoration: none;
}

section { display: none; padding: 30px; }
.active { display: block; }

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  display: inline-block;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}
button {
  padding: 10px 15px;
  border: none;
  background: #6c5ce7;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div><b>Creator Network</b></div>
  <div>
    <a onclick="show('home')">Home</a>
    <a onclick="show('creators')">Creators</a>
    <a onclick="show('apply')">Apply</a>
  </div>
</nav>

<section id="home" class="active">
  <h1>Creator Network</h1>
  <p>Join. Create. Grow.</p>
</section>

<section id="creators">
  <h2>Creators</h2>
  <div class="card">Paluten - Verified</div>
  <div class="card">iCrimax - Verified</div>
</section>

<section id="apply">
  <h2>Bewerbung</h2>

  <form id="applyForm">
    <input id="name" placeholder="Name">
    <input id="yt" placeholder="YouTube Link">
    <input id="subs" placeholder="Subscriber Count">
    <textarea id="desc" placeholder="Beschreibung"></textarea>
    <button type="submit">Senden</button>
  </form>

  <p id="status"></p>
</section>

<script type="module">
/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUx5Q-aJBhitaa9XPXUqkASMHvYJ6suhU",
  authDomain: "skytownrp-da7a3.firebaseapp.com",
  databaseURL: "https://skytownrp-da7a3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "skytownrp-da7a3",
  storageBucket: "skytownrp-da7a3.firebasestorage.app",
  messagingSenderId: "216159319972",
  appId: "1:216159319972:web:668a8ecb5d302d6b4ef331"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* NAV */
window.show = function(id){
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* WEBHOOK AUS FIREBASE */
async function getWebhook(){
  const snap = await get(ref(db, "webhook"));
  return snap.val();
}

/* FORM SUBMIT */
document.getElementById("applyForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const webhookURL = await getWebhook();

  const name = document.getElementById("name").value;
  const yt = document.getElementById("yt").value;
  const subs = document.getElementById("subs").value;
  const desc = document.getElementById("desc").value;

  const payload = {
    content: "Neue Creator Bewerbung",
    embeds: [{
      title: "Application",
      fields: [
        { name: "Name", value: name || "-" },
        { name: "YouTube", value: yt || "-" },
        { name: "Subs", value: subs || "-" },
        { name: "Beschreibung", value: desc || "-" }
      ]
    }]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    document.getElementById("status").innerText = "Gesendet!";
  } catch (err) {
    document.getElementById("status").innerText = "Fehler beim Senden";
  }
});
</script>

</body>
</html>
