<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicketShows</title>

  <!-- Bibliotheken: jsQR (Scanner) + qrcode (Generator) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #111111;
      --secondary-text: #666666;
      --accent: #ff7a00;
      --success: #16a34a;
      --danger: #ef4444;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --border: #eaeaea;
    }

    body.dark {
      --bg: #0f1115;
      --card: #171a21;
      --text: #ffffff;
      --secondary-text: #bdbdbd;
      --accent: #ff7a00;
      --success: #16a34a;
      --danger: #ef4444;
      --shadow: 0 8px 24px rgba(0,0,0,0.3);
      --border: #2b2f38;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: .3s;
      overflow-x: hidden;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
    }

    body.dark nav {
      background: rgba(15,17,21,0.7);
    }

    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 15px;
      text-decoration: none;
    }

    .navbar-logo-img {
      height: 40px;
      width: auto;
    }

    .navbar-logo-text {
      font-size: 1.2rem;
      color: var(--text);
      font-weight: 700;
    }

    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .theme-toggle {
      width: 50px;
      height: 50px;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      overflow: hidden;
      transition: .3s;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Header */
    header {
      padding: 80px 40px 40px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 5rem);
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .header-description {
      font-size: 1.1rem;
      color: var(--secondary-text);
      margin-bottom: 40px;
      max-width: 600px;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: .3s;
      font-family: Inter, sans-serif;
    }

    .btn.plus {
      background: var(--accent);
      color: white;
      font-size: 18px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
    }

    .btn.plus:hover {
      transform: scale(1.1);
    }

    .btn.save {
      background: var(--accent);
      color: white;
    }

    .btn.save:hover {
      transform: translateY(-2px);
    }

    .btn.small {
      padding: 8px 14px;
      font-size: 13px;
    }

    .btn.small:hover {
      transform: translateY(-2px);
    }

    .btn.secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 20px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .modal h3 {
      font-size: 1.5rem;
      color: var(--accent);
      margin: 0 0 20px 0;
      font-weight: 700;
    }

    .modal input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      font-size: 15px;
      background: var(--card);
      color: var(--text);
      font-family: Inter, sans-serif;
    }

    .modal input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal .row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* Show / tickets */
    .show {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: .3s;
    }

    .show:hover {
      box-shadow: var(--shadow);
    }

    .show-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      gap: 16px;
    }

    .show-title {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .show-header > div:nth-child(2) {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .show-info {
      font-size: 14px;
      color: var(--secondary-text);
    }

    .ticket-list {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ticket {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: .3s;
    }

    .ticket:hover {
      border-color: var(--accent);
    }

    .ticket-left {
      flex: 1;
      max-width: 60%;
    }

    .ticket.strikethrough {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .ticket .meta {
      font-size: 13px;
      color: var(--secondary-text);
      margin-top: 6px;
    }

    .ticket .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* QR pop-up */
    .qr-popup {
      display: none;
      position: fixed;
      z-index: 1300;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      padding: 32px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 1px solid var(--border);
    }

    .qr-popup.open {
      display: block;
    }

    .qr-popup h4 {
      color: var(--accent);
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .qr-popup img {
      max-width: 260px;
      width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
      border-radius: 12px;
    }

    .qr-popup .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* QR Error box */
    .qr-error {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      padding: 12px 20px;
      background: var(--danger);
      color: white;
      border-radius: 12px;
      font-weight: 700;
      display: none;
      box-shadow: var(--shadow);
    }

    .qr-error.show {
      display: block;
      animation: blink 0.35s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }

    /* Kamerabereich unten */
    .camera-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,17,21,0.95);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
      z-index: 1000;
      border-top: 1px solid var(--border);
    }

    #camera {
      width: 320px;
      max-width: 100%;
      height: 180px;
      border-radius: 12px;
      object-fit: cover;
      background: black;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }

    .camera-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    .hint {
      font-size: 13px;
      color: var(--secondary-text);
      margin-top: 8px;
      text-align: center;
    }

    .content-spacer {
      height: 230px;
    }

    /* responsive */
    @media(max-width: 768px) {
      nav {
        padding: 15px 20px;
      }

      header {
        padding: 60px 20px 40px 20px;
      }

      h1 {
        font-size: 2rem;
      }

      .top-actions {
        justify-content: center;
      }

      .modal {
        padding: 24px;
      }

      .show {
        padding: 16px;
      }

      .show-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .show-header > div:nth-child(2) {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
      }

      .ticket {
        flex-direction: column;
        align-items: flex-start;
      }

      .ticket .actions {
        width: 100%;
        justify-content: flex-start;
      }

      #camera {
        width: 280px;
        height: 160px;
      }

      .camera-controls {
        flex-direction: column;
      }
    }

    @media(max-width: 480px) {
      header {
        padding: 40px 16px 30px 16px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .modal {
        border-radius: 12px;
        padding: 20px;
      }

      .btn.small {
        width: 100%;
        text-align: center;
      }

      .modal .row {
        flex-direction: column;
      }

      .ticket-list {
        margin-top: 16px;
        padding-top: 16px;
      }

      #camera {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <div class="navbar-container">
    <a href="#" class="navbar-logo">
      <img class="navbar-logo-img" src="https://raw.githubusercontent.com/lamacOs/lamacos.github.io/refs/heads/main/logo.png" alt="lamacOs">
      <span class="navbar-logo-text">lamacOs</span>
    </a>
    <div class="navbar-menu">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Theme Toggle">
        <img id="themeImage" src="https://raw.githubusercontent.com/lamacOs/lamacos.github.io/main/lamacOsInfo/Lightmode.png" alt="">
      </button>
    </div>
  </div>
</nav>

<!-- Header -->
<header>
  <h1>TicketShows</h1>
  <p class="header-description">Verwalten Sie Shows und Tickets einfach. Perfekt für Theater, Zirkus und mehr.</p>
</header>

<div id="app">
  <div class="top-actions">
    <button class="btn plus" title="Neue Show" onclick="openModalStep(1)">＋</button>
    <button class="btn save" onclick="saveData()">Speichern</button>
  </div>

  <div id="show-list"></div>

  <div class="content-spacer"></div>
</div>

<!-- Modal für Show-Erstellung -->
<div id="backdrop" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-question">Wann?</h3>
    <input id="modal-input" type="text" oninput="handleInput()" placeholder="Eingabe..." />
    <div class="row">
      <button class="btn small secondary" onclick="closeModal()">Abbrechen</button>
      <button id="confirm-button" class="btn small" disabled onclick="handleNext()">Weiter</button>
    </div>
  </div>
</div>

<!-- QR-Popup -->
<div id="qr-popup" class="qr-popup" role="dialog" aria-hidden="true">
  <h4 id="qr-popup-title"></h4>
  <img id="qr-img" src="" alt="QR Code" />
  <div class="actions">
    <button class="btn small" id="open-link-btn">Öffnen (prüfen)</button>
    <button class="btn small secondary" onclick="closeQRPopup()">Schließen</button>
  </div>
</div>

<!-- QR-Fehleranzeige -->
<div id="qr-error" class="qr-error">Falscher QR Code</div>

<!-- Kamera-Bereich -->
<div class="camera-area" aria-hidden="false">
  <video id="camera" autoplay muted playsinline></video>
  <div class="camera-controls">
    <div id="camera-status">Kamera: aus</div>
    <button class="btn small" onclick="startCamera()">Start</button>
    <button class="btn small" onclick="stopCamera()">Stop</button>
  </div>
</div>

<script>
  /* ---------- Daten & Zustand ---------- */
  let step = 1;
  let currentShow = {};
  let shows = [];
  let expandedShow = null;

  let lastScanTime = 0;
  const SCAN_COOLDOWN = 1500;

  /* ---------- Theme Toggle ---------- */
  const body = document.body;
  const themeImage = document.getElementById("themeImage");

  const sunImage = "https://raw.githubusercontent.com/lamacOs/lamacos.github.io/main/lamacOsInfo/Lightmode.png";
  const moonImage = "https://raw.githubusercontent.com/lamacOs/lamacos.github.io/main/lamacOsInfo/Darkmode.png";

  function toggleTheme(){
    body.classList.toggle("dark");

    if(body.classList.contains("dark")){
      themeImage.src = moonImage;
      localStorage.setItem("theme", "dark");
    }else{
      themeImage.src = sunImage;
      localStorage.setItem("theme", "light");
    }
  }

  if(localStorage.getItem("theme") === "dark"){
    body.classList.add("dark");
    themeImage.src = moonImage;
  }

  /* ---------- Laden bei Start ---------- */
  window.addEventListener('load', () => {
    const saved = localStorage.getItem("ticketData");
    if (saved) {
      try {
        shows = JSON.parse(saved) || [];
      } catch(e) { shows = []; }
    }
    renderShows();
    checkURLForTicket();
  });

  /* ---------- localStorage Save ---------- */
  function saveData() {
    localStorage.setItem("ticketData", JSON.stringify(shows));
    toast("Gespeichert ✅");
  }

  function toast(text, time = 900) {
    const el = document.createElement('div');
    el.style.position = 'fixed';
    el.style.bottom = '230px';
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%)';
    el.style.background = '#111111';
    el.style.color = 'white';
    el.style.padding = '12px 20px';
    el.style.borderRadius = '12px';
    el.style.zIndex = 2500;
    el.style.fontWeight = '600';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(()=> el.remove(), time);
  }

  /* ---------- Modal Logik ---------- */
  function openModalStep(s) {
    step = s;
    currentShow = { time: '', place: '', name: '', tickets: [] };
    document.getElementById('modal-input').value = '';
    document.getElementById('backdrop').classList.add('open');
    updateModal();
    document.getElementById('modal-input').focus();
  }

  function updateModal() {
    const question = document.getElementById('modal-question');
    const input = document.getElementById('modal-input');
    const btn = document.getElementById('confirm-button');

    btn.disabled = true;

    if (step === 1) {
      question.innerText = "Wann?";
      input.placeholder = "z.B. 24.12.2025 19:00";
    } else if (step === 2) {
      question.innerText = "Wo?";
      input.placeholder = "z.B. Stadthalle";
    } else if (step === 3) {
      question.innerText = "Euer Name?";
      input.placeholder = "z.B. CoolBand";
    }
  }

  function handleInput() {
    const v = document.getElementById('modal-input').value.trim();
    const btn = document.getElementById('confirm-button');
    btn.disabled = !v;
  }

  function handleNext() {
    const v = document.getElementById('modal-input').value.trim();
    if (!v) return;

    if (step === 1) currentShow.time = v;
    else if (step === 2) currentShow.place = v;
    else if (step === 3) {
      currentShow.name = v;
      currentShow.tickets = [];
      shows.push(currentShow);
      closeModal();
      renderShows();
      saveData();
      return;
    }
    step++;
    document.getElementById('modal-input').value = '';
    updateModal();
    document.getElementById('modal-input').focus();
  }

  function closeModal() {
    document.getElementById('backdrop').classList.remove('open');
  }

  /* ---------- Render Shows & Tickets ---------- */
  function renderShows() {
    const container = document.getElementById('show-list');
    container.innerHTML = '';
    shows.forEach((show, sIndex) => {
      const showDiv = document.createElement('div');
      showDiv.className = 'show';

      const header = document.createElement('div');
      header.className = 'show-header';

      const title = document.createElement('div');
      title.className = 'show-title';
      title.textContent = show.name;

      const right = document.createElement('div');
      right.style.display = 'flex';
      right.style.gap = '12px';
      right.style.alignItems = 'center';
      right.style.flexWrap = 'wrap';

      const info = document.createElement('div');
      info.className = 'show-info';
      info.textContent = `${show.place} • ${show.time}`;

      const addTicketBtn = document.createElement('button');
      addTicketBtn.className = 'btn small';
      addTicketBtn.textContent = 'Ticket +';
      addTicketBtn.onclick = (e) => { e.stopPropagation(); addTicketPrompt(sIndex); };

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'btn small secondary';
      toggleBtn.textContent = expandedShow === sIndex ? '⬆ Einklappen' : '⬇ Ausklappen';
      toggleBtn.onclick = (e) => { e.stopPropagation(); toggleShow(sIndex); };

      right.appendChild(info);
      right.appendChild(addTicketBtn);
      right.appendChild(toggleBtn);

      header.appendChild(title);
      header.appendChild(right);

      showDiv.appendChild(header);

      if (expandedShow === sIndex) {
        const ticketList = document.createElement('div');
        ticketList.className = 'ticket-list';

        if (show.tickets.length === 0) {
          const empty = document.createElement('div');
          empty.style.color = 'var(--secondary-text)';
          empty.textContent = 'Keine Tickets. Klick auf "Ticket +" um eins hinzuzufügen.';
          ticketList.appendChild(empty);
        }

        show.tickets.forEach((ticket, tIndex) => {
          const t = document.createElement('div');
          t.className = 'ticket' + (ticket.used ? ' strikethrough' : '');
          const left = document.createElement('div');
          left.className = 'ticket-left';
          const titleLine = document.createElement('div');
          titleLine.style.fontWeight = '600';
          titleLine.innerHTML = `Sitz: ${escapeHtml(ticket.seat)}`;
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.innerText = `${show.place} • ${show.time}`;
          left.appendChild(titleLine);
          left.appendChild(meta);

          const actions = document.createElement('div');
          actions.className = 'actions';

          const useBtn = document.createElement('button');
          useBtn.className = 'btn small';
          useBtn.textContent = ticket.used ? '✓ Benutzt' : 'Benutzt';
          useBtn.onclick = (e) => { e.stopPropagation(); markTicketUsed(sIndex, tIndex); };

          const qrBtn = document.createElement('button');
          qrBtn.className = 'btn small';
          qrBtn.textContent = 'QR Code';
          qrBtn.onclick = (e) => { e.stopPropagation(); showTicketQR(sIndex, tIndex); };

          const delBtn = document.createElement('button');
          delBtn.className = 'btn small secondary';
          delBtn.textContent = 'Löschen';
          delBtn.onclick = (e) => { e.stopPropagation(); deleteTicket(sIndex, tIndex); };

          actions.appendChild(useBtn);
          actions.appendChild(qrBtn);
          actions.appendChild(delBtn);

          t.appendChild(left);
          t.appendChild(actions);
          ticketList.appendChild(t);
        });

        showDiv.appendChild(ticketList);
      }

      container.appendChild(showDiv);
    });
  }

  /* ---------- Helper Aktionen ---------- */
  function toggleShow(idx) {
    expandedShow = expandedShow === idx ? null : idx;
    renderShows();
  }

  function addTicketPrompt(showIndex) {
    const seat = prompt("Welcher Sitzplatz?");
    if (!seat) return;
    shows[showIndex].tickets.push({ seat: seat.trim(), used: false });
    renderShows();
    saveData();
  }

  function markTicketUsed(sIndex, tIndex) {
    if (!shows[sIndex] || !shows[sIndex].tickets[tIndex]) return;
    shows[sIndex].tickets[tIndex].used = true;
    renderShows();
    saveData();
  }

  function deleteTicket(sIndex, tIndex) {
    if (!shows[sIndex]) return;
    shows[sIndex].tickets.splice(tIndex, 1);
    renderShows();
    saveData();
  }

  /* ---------- QR Bild Popup ---------- */
  const qrPopup = document.getElementById('qr-popup');
  const qrImg = document.getElementById('qr-img');
  const qrTitle = document.getElementById('qr-popup-title');
  const openLinkBtn = document.getElementById('open-link-btn');

  let currentQRLink = '';

  function showTicketQR(sIndex, tIndex) {
    const codeText = `ticket=${sIndex}-${tIndex}`;
    QRCode.toDataURL(codeText, { width: 512, margin: 1 }, (err, url) => {
      if (err) {
        alert('QR konnte nicht erzeugt werden: ' + err);
        return;
      }
      currentQRLink = makeAbsoluteTicketURL(codeText);
      qrTitle.textContent = `${shows[sIndex].name} — Sitz ${shows[sIndex].tickets[tIndex].seat}`;
      qrImg.src = url;
      openLinkBtn.onclick = () => {
        window.location.href = currentQRLink;
      };
      qrPopup.classList.add('open');
      qrPopup.setAttribute('aria-hidden', 'false');
    });
  }

  function closeQRPopup() {
    qrPopup.classList.remove('open');
    qrPopup.setAttribute('aria-hidden', 'true');
    qrImg.src = '';
    currentQRLink = '';
  }

  function makeAbsoluteTicketURL(codeText) {
    const base = location.origin + location.pathname;
    const param = codeText.startsWith('ticket=') ? codeText.replace('ticket=', '') : codeText;
    return base + '?ticket=' + encodeURIComponent(param);
  }

  /* ---------- URL Handling ---------- */
  function checkURLForTicket() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('ticket');
    if (!raw) return;
    handleQRCodeText('ticket=' + raw);
    history.replaceState({}, document.title, location.pathname);
  }

  /* ---------- Scanner + Kamera ---------- */
  const video = document.getElementById('camera');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let stream = null;
  let scanning = false;

  async function startCamera() {
    if (scanning) return;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.play();
      scanning = true;
      document.getElementById('camera-status').textContent = 'Kamera: an';
      scanLoop();
    } catch (err) {
      alert('Kamera konnte nicht gestartet werden: ' + err.message);
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    scanning = false;
    document.getElementById('camera-status').textContent = 'Kamera: aus';
  }

  function scanLoop() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      try {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: "attemptBoth" });
        if (code && code.data) {
          const now = Date.now();
          if (now - lastScanTime > SCAN_COOLDOWN) {
            lastScanTime = now;
            handleQRCodeText(code.data);
          }
        }
      } catch (e) {
        // ignorieren
      }
    }
    requestAnimationFrame(scanLoop);
  }

  /* ---------- QR Handling ---------- */
  function handleQRCodeText(text) {
    let ticketParam = null;

    try {
      const lower = text.toLowerCase();
      if (lower.includes('?ticket=')) {
        const idx = lower.indexOf('?ticket=');
        ticketParam = text.substring(idx + 8);
        if (ticketParam.includes('&')) ticketParam = ticketParam.split('&')[0];
      } else if (lower.includes('ticket=')) {
        const idx = lower.indexOf('ticket=');
        ticketParam = text.substring(idx + 7);
        if (ticketParam.includes('&')) ticketParam = ticketParam.split('&')[0];
      } else {
        if (/^\d+\-\d+$/.test(text.trim())) {
          ticketParam = text.trim();
        }
      }
    } catch (e) {
      ticketParam = null;
    }

    if (!ticketParam) {
      flashError('Falscher QR Code');
      return;
    }

    const parts = ticketParam.split('-');
    const sIndex = Number(parts[0]);
    const tIndex = Number(parts[1]);

    if (!Number.isInteger(sIndex) || !Number.isInteger(tIndex)) {
      flashError('Falscher QR Code');
      return;
    }

    if (!shows[sIndex] || !shows[sIndex].tickets[tIndex]) {
      flashError('Falscher QR Code');
      return;
    }

    shows[sIndex].tickets[tIndex].used = true;
    saveData();
    renderShows();
    showSuccess(`Ticket benutzt: ${shows[sIndex].name} — Sitz ${shows[sIndex].tickets[tIndex].seat}`);
  }

  function flashError(msg) {
    const el = document.getElementById('qr-error');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function showSuccess(msg) {
    toast(msg, 1200);
  }

  /* ---------- Utility ---------- */
  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

</script>
