<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lamacOs PlayHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#f6f7fb;
  --accent:#ff7a00;
  --border:rgba(0,0,0,0.08);
}

[data-theme="dark"]{
  --bg:#0f0f12;
  --text:#ffffff;
  --card:#17171c;
  --border:rgba(255,255,255,0.08);
}

*{
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 22px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:var(--bg);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:34px;
  height:34px;
  border-radius:8px;
}

.logo span{
  font-weight:700;
  color:var(--text);
}

.toggle{
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:30px auto;
  padding:0 20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}

h2,h3{
  color:var(--accent);
  margin-top:0;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}

button{
  background:var(--accent);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  border:none;
}

button:hover{
  opacity:0.9;
}

.small{
  font-size:13px;
  opacity:0.7;
}

/* GAME GRID */
#game-list{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.game-card{
  width:140px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
  transition:.2s;
}

.game-card:hover{
  transform:translateY(-3px);
}

.game-card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

/* IFRAME GAME */
iframe{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  border:none;
  z-index:999;
  background:#000;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/lamacOs/lamacos.github.io/refs/heads/main/logo.png">
    <span>PlayHub</span>
  </div>

  <button class="toggle" onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<!-- LOGIN -->
<div class="container" id="auth">
  <div class="card">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <button onclick="showRegister()">Registrieren</button>
  </div>
</div>

<!-- REGISTER -->
<div class="container" id="register" style="display:none;">
  <div class="card">
    <h3>Registrieren</h3>
    <input id="reg-email" type="email" placeholder="E-Mail">
    <input id="reg-password" type="password" placeholder="Passwort">
    <button onclick="register()">Account erstellen</button>
    <button onclick="hideRegister()">Abbrechen</button>
  </div>
</div>

<div class="container">
  <p class="small">
    Spiele stammen von scratch.mit.edu
  </p>
</div>

<!-- UPLOAD -->
<div class="container" id="upload" style="display:none;">
  <div class="card">
    <h3>Spiel hochladen</h3>
    <input id="game-name" placeholder="Spielname">
    <input id="game-link" placeholder="Scratch Link">
    <input id="game-cover" placeholder="Cover Bild URL (wird ignoriert)">
    <button onclick="uploadGame()">Speichern</button>
  </div>
</div>

<!-- GAMES -->
<div class="container">
  <div class="card">
    <h3>Spiele</h3>
    <div id="game-list"></div>
  </div>
</div>

<script>
function toggleTheme(){
  const r=document.documentElement;
  r.dataset.theme=r.dataset.theme==="dark"?"light":"dark";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDT58qXz9yl16t3_uxSSVqbxGsXlbqNJiY",
  authDomain: "poki2-263c6.firebaseapp.com",
  databaseURL: "https://poki2-263c6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "poki2-263c6",
  storageBucket: "poki2-263c6.appspot.com",
  messagingSenderId: "995713391414",
  appId: "1:995713391414:web:8c9ccfed82a82f7d27f197"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const gameList=document.getElementById("game-list");

const LOGO_URL =
"https://raw.githubusercontent.com/lamacOs/lamacos.github.io/refs/heads/main/logo.png";

/* AUTH */
window.showRegister=()=>{
  document.getElementById("auth").style.display="none";
  document.getElementById("register").style.display="block";
};

window.hideRegister=()=>{
  document.getElementById("auth").style.display="block";
  document.getElementById("register").style.display="none";
};

onAuthStateChanged(auth,u=>{
  document.getElementById("upload").style.display = u ? "block" : "none";
});

/* LOGIN */
window.login=async()=>{
  await signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );
};

/* REGISTER */
window.register=async()=>{
  await createUserWithEmailAndPassword(
    auth,
    reg-email.value,
    reg-password.value
  );
};

/* UPLOAD */
window.uploadGame=async()=>{
  await push(ref(db,"games"),{
    name: document.getElementById("game-name").value,
    link: document.getElementById("game-link").value,
    cover: document.getElementById("game-cover").value
  });
};

/* LOAD GAMES */
onValue(ref(db,"games"),snap=>{
  gameList.innerHTML="";

  snap.forEach(c=>{
    const g=c.val();

    const div=document.createElement("div");
    div.className="game-card";

    // 🔥 FIX: IMMER LOGO ALS COVER
    div.innerHTML=`
      <img src="${LOGO_URL}">
      <div style="padding:6px">${g.name}</div>
    `;

    div.onclick=()=>playGame(g.link);
    gameList.appendChild(div);
  });
});

/* PLAY GAME */
window.playGame=(link)=>{
  const id=link.match(/projects\/(\d+)/)?.[1];
  if(!id) return;

  const iframe=document.createElement("iframe");
  iframe.src=`https://scratch.mit.edu/projects/${id}/embed`;

  const btn=document.createElement("button");
  btn.innerText="Zurück";
  btn.style.position="fixed";
  btn.style.top="20px";
  btn.style.left="20px";
  btn.style.zIndex="1000";

  btn.onclick=()=>{
    iframe.remove();
    btn.remove();
  };

  document.body.appendChild(iframe);
  document.body.appendChild(btn);
};
</script>

</body>
</html>
