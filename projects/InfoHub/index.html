<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>InfoHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --accent: #38bdf8;
    }

    body.light {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --accent: #2563eb;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      padding: 18px;
      background: var(--card);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 950px;
      margin: auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
    }

    .news-item {
      margin-bottom: 15px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    body.light .news-item {
      background: rgba(0,0,0,0.05);
    }

    .small {
      font-size: 13px;
      opacity: 0.8;
    }

    h3 {
      margin-top: 0;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <div class="title">InfoHub</div>
  <button onclick="toggleMode()">Dark / Light</button>
</header>

<div class="container">

  <div class="card">
    <h2>Kalenderwoche</h2>
    <div id="week"></div>
  </div>

  <div class="card">
    <h2>Satz der Woche</h2>
    <div>
      Kleine Schritte führen zu großen Veränderungen
    </div>
  </div>

  <div class="card">
    <h2>Wort des Tages</h2>
    <div id="word">Lade Wort...</div>
  </div>

  <div class="card">
    <h2>News</h2>
    <div id="news">Lade News...</div>
  </div>

</div>

<script>

const RSS_PROXY =
  "https://api.rss2json.com/v1/api.json?rss_url=";

const customNews = [

  {
    title: "Hide and Seek entfällt",
    date: "29.05.2026 11:15",
    description:
      "Das am 20.6.2026 geplante 'Hide and Seek' im Dorf Middelsfähr fällt laut Organisator wegen mangelnden Teilnehmern wahrscheinlich aus."
  }

];

// DARK MODE
function toggleMode() {
  document.body.classList.toggle("light");
}

// KALENDERWOCHE
function getWeekNumber(d) {

  d = new Date(
    Date.UTC(
      d.getFullYear(),
      d.getMonth(),
      d.getDate()
    )
  );

  const dayNum = d.getUTCDay() || 7;

  d.setUTCDate(d.getUTCDate() + 4 - dayNum);

  const yearStart = new Date(
    Date.UTC(d.getUTCFullYear(), 0, 1)
  );

  return Math.ceil(
    (((d - yearStart) / 86400000) + 1) / 7
  );

}

function loadWeek() {

  const week = getWeekNumber(new Date());

  document.getElementById("week").innerHTML =
    "Kalenderwoche: <b>" + week + "</b>";

}

// WORT DES TAGES
async function loadWord() {

  try {

    const url =
      RSS_PROXY +
      encodeURIComponent(
        "https://www.merriam-webster.com/wotd/feed/rss2"
      );

    const res = await fetch(url);

    const data = await res.json();

    const item = data.items[0];

    document.getElementById("word").innerHTML = `
      <h3>${item.title}</h3>
      <p class="small">${item.pubDate}</p>
      <p>${item.description}</p>
    `;

  } catch (e) {

    document.getElementById("word").innerHTML =
      "Fehler beim Laden.";

  }

}

// NEWS
async function loadNews() {

  try {

    const url =
      RSS_PROXY +
      encodeURIComponent(
        "https://www.tagesschau.de/xml/rss2"
      );

    const res = await fetch(url);

    const data = await res.json();

    let html = "";

    // EIGENE NEWS
    customNews.forEach(item => {

      html += `
        <div class="news-item">
          <h3>${item.title}</h3>
          <p class="small">${item.date}</p>
          <p>${item.description}</p>
        </div>
      `;

    });

    // TAGESSCHAU NEWS
    data.items.slice(0, 50).forEach(item => {

      html += `
        <div class="news-item">
          <h3>${item.title}</h3>

          <p class="small">
            ${item.pubDate}
          </p>

          <p>
            ${item.description || ""}
          </p>
        </div>
      `;

    });

    document.getElementById("news").innerHTML =
      html;

  } catch (e) {

    document.getElementById("news").innerHTML =
      "Fehler beim Laden.";

  }

}

// START
loadWeek();
loadWord();
loadNews();

</script>

</body>
</html>
