<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hide and Seek Middelsfähr</title>
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
.container { max-width: 600px; margin: auto; }
input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; }
button { background: #22c55e; font-weight: bold; cursor: pointer; }
.member { background: #1e293b; padding: 10px; margin: 5px 0; border-radius: 8px; }
.hidden { display: none; }
.warning { color: red; }
a { color: #38bdf8; text-decoration: none; }
</style>
</head>
<body>

<div class="container">
  <img src="https://raw.githubusercontent.com/lamacOs/Hide-and-Seek/refs/heads/main/9920129E-53B8-4BD7-8626-B212B4CF7163.png" width="400">
<h1>Hide and Seek Middelsfähr</h1>
<video width="100%" controls>
  <source src="https://raw.githubusercontent.com/lamacOs/Hide-and-Seek/refs/heads/main/20260306_1203_New%20Video_simple_compose_01kk1d1dngefcbma5k311y8y67.mp4" type="video/mp4">
</video>
<div id="codeBox">
    <input type="password" id="accessCode" placeholder="Zugangscode eingeben">
    <button onclick="checkCode()">Zugang prüfen</button>
</div>

<div id="formBox" class="hidden">
<h2>Anmeldung</h2>
<input type="text" id="firstname" placeholder="Vorname">
<input type="text" id="lastname" placeholder="Nachname">
<input type="number" id="age" placeholder="Alter">
<input type="text" id="class" placeholder="Klasse">

<h3>Nimmt mit:</h3>
<label><input type="checkbox" id="item-flashlight" name="items" value="Taschenlampe"> Taschenlampe</label><br>
<label><input type="checkbox" id="item-compass" name="items" value="Kompass"> Kompass</label><br>
<label><input type="checkbox" id="item-vehicle" name="items" value="Fahrzeuge"> Fahrrad/Inliner/Rollschuhe/Skateboard/Hoverboard/Roller/Kettcar</label><br>
<label><input type="checkbox" id="item-map" name="items" value="Karte von Middelsfähr"> Karte von Middelsfähr</label>

<p class="warning">!!! ANDERE SACHEN SIND NICHT ERLAUBT !!!</p>

<label><input type="checkbox" id="agbCheck"> Ich habe die <a href="#" onclick="showAGB(); return false;">AGB's</a> gelesen</label><br>
<label><input type="checkbox" id="rulesCheck"> Ich bin mit den <a href="#" onclick="showRules(); return false;">Spielregeln</a> einverstanden</label><br><br>
<button onclick="register()">Anmelden</button>
</div>

<h2>Teilnehmer (<span id="count">0</span>)</h2>
<input type="text" id="search" placeholder="Nach Namen suchen">
<div id="members"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA5dYM02tcTl7uDvX1WgyWqpihCWvfeIHs",
    authDomain: "hide-and-seek-d8104.firebaseapp.com",
    databaseURL: "https://hide-and-seek-d8104-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hide-and-seek-d8104",
    storageBucket: "hide-and-seek-d8104.firebasestorage.app",
    messagingSenderId: "967191587097",
    appId: "1:967191587097:web:19765825deb306ab2dbd88"
};

const ACCESS_CODE = "HideAndSeekMiddelsfähr_26419";
let database = null;

try {
    const app = initializeApp(firebaseConfig);
    database = getDatabase(app);
} catch (err) {
    console.error("Firebase konnte nicht initialisiert werden:", err);
}

window.checkCode = function() {
    const code = document.getElementById("accessCode").value;
    if (code === ACCESS_CODE) {
        document.getElementById("codeBox").style.display = "none";
        document.getElementById("formBox").classList.remove("hidden");
    } else {
        alert("Falscher Code!");
    }
};

function clearForm() {
    document.getElementById("firstname").value = "";
    document.getElementById("lastname").value = "";
    document.getElementById("age").value = "";
    document.getElementById("class").value = "";
    document.querySelectorAll('input[name="items"]').forEach((cb) => { cb.checked = false; });
    document.getElementById("agbCheck").checked = false;
    document.getElementById("rulesCheck").checked = false;
}

window.register = function() {
    if (!database) {
        alert("Datenbank-Verbindung fehlt. Bitte Seite neu laden.");
        return Promise.resolve();
    }

    if (!document.getElementById("agbCheck").checked || !document.getElementById("rulesCheck").checked) {
        alert("Bitte AGB und Regeln akzeptieren!");
        return Promise.resolve();
    }

    const firstname = document.getElementById("firstname").value.trim();
    const lastname = document.getElementById("lastname").value.trim();
    const age = document.getElementById("age").value.trim();
    const className = document.getElementById("class").value.trim();

    if (!firstname || !lastname || !age || !className) {
        alert("Bitte alle Felder ausfüllen!");
        return Promise.resolve();
    }

    const items = Array.from(document.querySelectorAll('input[name="items"]:checked'), (cb) => cb.value);

    return push(ref(database, "participants"), {
        firstname,
        lastname,
        age,
        class: className,
        items
    })
    .then(() => {
        alert("Erfolgreich angemeldet!");
        clearForm();
    })
    .catch((err) => {
        console.error(err);
        alert("Fehler beim Speichern!");
    });
};

if (database) {
    onValue(
        ref(database, "participants"),
        (snapshot) => {
            const membersDiv = document.getElementById("members");
            membersDiv.innerHTML = "";
            let count = 0;

            snapshot.forEach((child) => {
                const data = child.val();
                count++;
                const div = document.createElement("div");
                div.className = "member";
                div.innerText = `${data.firstname} ${data.lastname} | Klasse: ${data.class}`;
                membersDiv.appendChild(div);
            });

            document.getElementById("count").innerText = count;
        },
        (err) => {
            console.error("Fehler beim Laden der Teilnehmer:", err);
        }
    );
}

document.getElementById("search").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    document.querySelectorAll(".member").forEach((member) => {
        member.style.display = member.innerText.toLowerCase().includes(filter) ? "block" : "none";
    });
});

window.showAGB = function() {
    alert(`Für Diebstahl oder Verletzungen übernehmen wir keine Haftung.
Betreten privater Grundstücke strengstens verboten.
Nach der Anmeldung kann jeder die Anmeldedaten sehen.
Während des Spiels nur nach Abmeldung bei Tomte / Oscar Lachmund (oslamu@mail.de) gehen.`);
};

window.showRules = function() {
    alert(`2 Teams (Sucher & Verstecker), jeweils 2 Klassen.
Kleine Teams 1-4 Personen bleiben zusammen.
Teams tauschen, wenn alle gefunden sind.
Fläche Middelsfähr nicht verlassen.
Fragen: lamacos.youtube@web.de`);
};
</script>

</body>
</html>
