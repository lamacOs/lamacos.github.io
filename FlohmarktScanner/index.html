<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlohmarktScanner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
  min-height: 100vh;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.hero {
  text-align: center;
  margin-bottom: 30px;
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.notice {
  margin-bottom: 22px;
  padding: 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
}

.notice a {
  color: #93c5fd;
}

.buttonGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 18px;
}

.mainButton,
.smallButton {
  border: none;
  border-radius: 18px;
  cursor: pointer;
  transition: 0.25s;
  color: white;
  font-family: inherit;
}

.mainButton {
  padding: 22px;
  font-size: 1rem;
  font-weight: 600;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
}

.mainButton:hover,
.smallButton:hover {
  transform: translateY(-2px) scale(1.01);
}

#cameraArea {
  display: none;
  margin-top: 25px;
  text-align: center;
}

video,
canvas {
  width: 100%;
  max-height: 420px;
  border-radius: 22px;
  object-fit: cover;
  background: black;
  margin-bottom: 18px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.smallButton {
  padding: 14px 18px;
  background: rgba(255,255,255,0.12);
}

#priceInput {
  display: none;
  margin-top: 24px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.12);
  color: white;
  font-size: 16px;
  margin-bottom: 14px;
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

@media (max-width: 700px) {
  .hero h1 {
    font-size: 2.2rem;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <h1>FlohmarktScanner</h1>
    <p>Scanne Gegenstände und speichere Preise smarter 🔍</p>
  </div>

  <div class="card">
    <div class="notice">
      Neuer Scanner verfügbar:
      <a href="https://lamacos.github.io/Flohmarkt-Scanner-2.0/" target="_blank">Flohmarkt-Scanner 2.0</a>
    </div>

    <div class="buttonGrid" id="startButtons">
      <button class="mainButton" onclick="startAdd()">📦 Neues Objekt hinzufügen</button>
      <button class="mainButton" onclick="startScan()">🔍 Vorhandenes Objekt scannen</button>
    </div>

    <div id="cameraArea">
      <video id="camera" autoplay playsinline></video>
      <canvas id="snapshot"></canvas>

      <div class="controls">
        <button class="smallButton" onclick="takePicture()">📸 Foto machen</button>
        <button class="smallButton" onclick="switchCamera()">🔄 Kamera wechseln</button>
        <button class="smallButton" onclick="cancel()">✖ Abbrechen</button>
      </div>
    </div>

    <div id="priceInput">
      <input type="text" id="price" placeholder="z.B. 3.50 ohne €">
      <button class="mainButton" onclick="saveObject()">Speichern</button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('camera');
const canvas = document.getElementById('snapshot');
const ctx = canvas.getContext('2d');
const priceDiv = document.getElementById('priceInput');
const priceInput = document.getElementById('price');
const startButtons = document.getElementById('startButtons');
const cameraArea = document.getElementById('cameraArea');

let mode = '';
let currentImageData = null;
let stream = null;
let useFront = false;

function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: useFront ? 'user' : 'environment'
    }
  }).then((cameraStream) => {
    stream = cameraStream;
    video.srcObject = stream;
    video.style.display = 'block';
    canvas.style.display = 'none';
    cameraArea.style.display = 'block';
  }).catch((error) => {
    alert('Kamera-Fehler: ' + error);
  });
}

function switchCamera() {
  useFront = !useFront;
  startCamera();
}

function startAdd() {
  mode = 'add';
  startButtons.style.display = 'none';
  priceDiv.style.display = 'none';
  startCamera();
}

function startScan() {
  mode = 'scan';
  startButtons.style.display = 'none';
  priceDiv.style.display = 'none';
  startCamera();
}

function takePicture() {
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');

  tempCanvas.width = 100;
  tempCanvas.height = 100;

  tempCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, 100, 100);

  currentImageData = tempCanvas.toDataURL('image/jpeg', 0.4);

  video.style.display = 'none';
  canvas.width = 100;
  canvas.height = 100;
  ctx.drawImage(tempCanvas, 0, 0);
  canvas.style.display = 'block';

  if (mode === 'add') {
    priceDiv.style.display = 'block';
  } else {
    scanObject();
  }
}

function cancel() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  cameraArea.style.display = 'none';
  priceDiv.style.display = 'none';
  startButtons.style.display = 'grid';
}

function saveObject() {
  const price = parseFloat(priceInput.value.replace(',', '.'));

  if (!currentImageData || isNaN(price)) {
    alert('Bitte gültige Daten eingeben');
    return;
  }

  const list = JSON.parse(localStorage.getItem('objects') || '[]');

  list.push({
    image: currentImageData,
    price: price.toFixed(2)
  });

  localStorage.setItem('objects', JSON.stringify(list));

  alert('Gespeichert!');
  cancel();
}

async function scanObject() {
  const ref = await getAvgColor(currentImageData);
  const list = JSON.parse(localStorage.getItem('objects') || '[]');

  let bestMatch = null;
  let bestScore = Infinity;

  for (const obj of list) {
    const cmp = await getAvgColor(obj.image);

    const d = Math.sqrt(
      (ref.r - cmp.r) ** 2 +
      (ref.g - cmp.g) ** 2 +
      (ref.b - cmp.b) ** 2
    );

    if (d < bestScore) {
      bestScore = d;
      bestMatch = obj;
    }
  }

  if (bestMatch && bestScore < 40) {
    alert('Preis: ' + bestMatch.price + ' €');
  } else {
    alert('Kein passendes Objekt gefunden.');
  }

  cancel();
}

function getAvgColor(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();

    img.onload = () => {
      const temp = document.createElement('canvas');
      const tempCtx = temp.getContext('2d');

      temp.width = img.width;
      temp.height = img.height;

      tempCtx.drawImage(img, 0, 0);

      const area = tempCtx.getImageData(img.width / 2 - 10, img.height / 2 - 10, 20, 20).data;

      let r = 0;
      let g = 0;
      let b = 0;
      let n = 0;

      for (let i = 0; i < area.length; i += 4) {
        r += area[i];
        g += area[i + 1];
        b += area[i + 2];
        n++;
      }

      resolve({
        r: r / n,
        g: g / n,
        b: b / n
      });
    };

    img.src = dataUrl;
  });
}
</script>

</body>
</html>
