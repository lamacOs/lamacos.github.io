<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlohmarktScanner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --accent:#ff7a00;
  --border:rgba(0,0,0,0.08);
}

.dark{
  --bg:#0b0f17;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:32px;
  height:32px;
}

.logo span{
  color:black; /* WICHTIG: einzige schwarze Überschrift */
  font-weight:700;
}

.toggleBtn{
  background:var(--card);
  border:1px solid var(--border);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  margin-bottom:20px;
}

.hero h1{
  color:var(--accent);
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
}

/* BUTTONS */
.buttonGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.mainButton,
.smallButton{
  border:none;
  border-radius:14px;
  cursor:pointer;
  transition:0.2s;
  font-family:inherit;
}

.mainButton{
  background:var(--accent);
  color:white;
  padding:18px;
  font-weight:600;
}

.smallButton{
  background:rgba(255,255,255,0.08);
  color:var(--text);
  padding:12px;
}

.mainButton:hover,
.smallButton:hover{
  transform:scale(1.02);
}

/* CAMERA */
#cameraArea{
  display:none;
  margin-top:20px;
  text-align:center;
}

video, canvas{
  width:100%;
  max-height:420px;
  border-radius:16px;
  background:black;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
}

/* INPUT */
#priceInput{
  display:none;
  margin-top:15px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}
</style>
</head>

<body class="light">

<div class="container">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/lamacos/lamacos.github.io/refs/heads/main/logo.png">
      <span>FlohmarktScanner</span>
    </div>

    <button class="toggleBtn" onclick="toggleMode()">🌗</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>FlohmarktScanner</h1>
    <p>Scanne Gegenstände und speichere Preise smarter 🔍</p>
  </div>

  <div class="card">

    <div class="buttonGrid" id="startButtons">
      <button class="mainButton" onclick="startAdd()">📦 Neues Objekt hinzufügen</button>
      <button class="mainButton" onclick="startScan()">🔍 Objekt scannen</button>
    </div>

    <div id="cameraArea">
      <video id="camera" autoplay playsinline></video>
      <canvas id="snapshot"></canvas>

      <div class="controls">
        <button class="smallButton" onclick="takePicture()">📸 Foto</button>
        <button class="smallButton" onclick="switchCamera()">🔄 Kamera</button>
        <button class="smallButton" onclick="cancel()">✖ Abbrechen</button>
      </div>
    </div>

    <div id="priceInput">
      <input type="text" id="price" placeholder="z.B. 3.50">
      <button class="mainButton" onclick="saveObject()">Speichern</button>
    </div>

  </div>
</div>

<script>
const video = document.getElementById('camera');
const canvas = document.getElementById('snapshot');
const ctx = canvas.getContext('2d');

const priceDiv = document.getElementById('priceInput');
const priceInput = document.getElementById('price');
const startButtons = document.getElementById('startButtons');
const cameraArea = document.getElementById('cameraArea');

let mode = '';
let currentImageData = null;
let stream = null;
let useFront = false;

/* DARK/LIGHT */
function toggleMode(){
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}

/* CAMERA */
function startCamera(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }

  navigator.mediaDevices.getUserMedia({
    video:{ facingMode: useFront ? 'user' : 'environment' }
  }).then(s=>{
    stream = s;
    video.srcObject = stream;
    cameraArea.style.display = 'block';
  }).catch(e=>{
    alert('Kamera Fehler: ' + e);
  });
}

function switchCamera(){
  useFront = !useFront;
  startCamera();
}

/* MODES */
function startAdd(){
  mode='add';
  startButtons.style.display='none';
  priceDiv.style.display='none';
  startCamera();
}

function startScan(){
  mode='scan';
  startButtons.style.display='none';
  priceDiv.style.display='none';
  startCamera();
}

/* PHOTO */
function takePicture(){
  const temp = document.createElement('canvas');
  const tctx = temp.getContext('2d');

  temp.width = 200;
  temp.height = 200;

  tctx.drawImage(video,0,0,video.videoWidth,video.videoHeight,0,0,200,200);

  currentImageData = temp.toDataURL('image/jpeg',0.6);

  canvas.width = 200;
  canvas.height = 200;
  ctx.drawImage(temp,0,0);

  video.style.display='none';
  canvas.style.display='block';

  if(mode==='add'){
    priceDiv.style.display='block';
  } else {
    scanObject();
  }
}

/* CANCEL */
function cancel(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
  cameraArea.style.display='none';
  priceDiv.style.display='none';
  startButtons.style.display='grid';
  video.style.display='block';
  canvas.style.display='none';
}

/* SAVE */
function saveObject(){
  const price = parseFloat(priceInput.value.replace(',','.'));

  if(!currentImageData || isNaN(price)){
    alert('Ungültig');
    return;
  }

  const list = JSON.parse(localStorage.getItem('objects')||'[]');

  list.push({image:currentImageData,price:price.toFixed(2)});
  localStorage.setItem('objects',JSON.stringify(list));

  alert('Gespeichert!');
  cancel();
}

/* SCAN */
async function scanObject(){
  const ref = await getAvgColor(currentImageData);
  const list = JSON.parse(localStorage.getItem('objects')||'[]');

  let best=null;
  let bestScore=999999;

  for(const obj of list){
    const cmp = await getAvgColor(obj.image);

    const d = Math.sqrt(
      (ref.r-cmp.r)**2 +
      (ref.g-cmp.g)**2 +
      (ref.b-cmp.b)**2
    );

    if(d<bestScore){
      bestScore=d;
      best=obj;
    }
  }

  if(best && bestScore<40){
    alert('Preis: '+best.price+' €');
  } else {
    alert('Kein Treffer');
  }

  cancel();
}

/* COLOR */
function getAvgColor(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();

    img.onload=()=>{
      const c=document.createElement('canvas');
      const x=c.getContext('2d');

      c.width=img.width;
      c.height=img.height;

      x.drawImage(img,0,0);

      const d=x.getImageData(0,0,20,20).data;

      let r=0,g=0,b=0,n=0;

      for(let i=0;i<d.length;i+=4){
        r+=d[i];
        g+=d[i+1];
        b+=d[i+2];
        n++;
      }

      resolve({r:r/n,g:g/n,b:b/n});
    };

    img.src=dataUrl;
  });
}
</script>

</body>
</html>

</script>

</body>
</html>
