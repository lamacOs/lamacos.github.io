 <body data-template-id="__page-root" class="min-h-screen flex items-center justify-center">
  <main class="w-full flex flex-col items-center justify-center p-4">

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const menu = document.getElementById("menu");
    const playButton = document.getElementById("playButton");
    const highscoreDisplay = document.getElementById("highscoreDisplay");

    let paddle, ball, score, highscore = 0, gameRunning = false;

    function resetGame() {
      paddle = { width: 100, height: 15, x: canvas.width / 2 - 50, y: canvas.height - 30, speed: 7, dx: 0 };
      ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 4, dx: 4, dy: -4 };
      score = 0;
      gameRunning = true;
    }

    function drawPaddle() {
      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
      ctx.fill();
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#facc15";
      ctx.fill();
      ctx.closePath();
    }

    function drawScore() {
      ctx.fillStyle = "#ffffff";
      ctx.font = "600 18px Inter";
      ctx.fillText("Punkte: " + score, 10, 25);
    }

    function movePaddle() {
      paddle.x += paddle.dx;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
    }

    function moveBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;
      if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) ball.dx *= -1;
      if (ball.y - ball.radius < 0) ball.dy *= -1;
      if (ball.y + ball.radius >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.width) {
        ball.dy *= -1;
        score++;
        if (score > highscore) highscore = score;
      }
      if (ball.y - ball.radius > canvas.height) {
        gameRunning = false;
        showMenu();
      }
    }

    function draw() {
      if (!gameRunning) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPaddle();
      drawBall();
      drawScore();
      movePaddle();
      moveBall();
      requestAnimationFrame(draw);
    }

    function keyDown(e) {
      if (e.key === "ArrowRight") paddle.dx = paddle.speed;
      else if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
    }

    function keyUp(e) {
      if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
    }

    function showMenu() {
      canvas.classList.add("hidden");
      menu.style.display = "flex";
      highscoreDisplay.textContent = "Highscore: " + highscore;
    }

    function startGame() {
      resetGame();
      menu.style.display = "none";
      canvas.classList.remove("hidden");
      draw();
    }

    let touchStartX = 0;
    function touchStart(e) { touchStartX = e.touches[0].clientX; e.preventDefault(); }
    function touchMove(e) {
      if (!gameRunning) return;
      const diff = e.touches[0].clientX - touchStartX;
      paddle.x += diff;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
      touchStartX = e.touches[0].clientX;
      e.preventDefault();
    }

    playButton.addEventListener("click", startGame);
    document.addEventListener("keydown", keyDown);
    document.addEventListener("keyup", keyUp);
    canvas.addEventListener("touchstart", touchStart);
    canvas.addEventListener("touchmove", touchMove);
    showMenu();
  </script>
