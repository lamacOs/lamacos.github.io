<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Paddle Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff7a00;
      --background: #ffffff;
      --text: #111111;
      --secondary-text: #666666;
      --card-bg: #ffffff;
      --border: #eaeaea;
    }

    .dark-mode {
      --background: #0f1115;
      --text: #ffffff;
      --secondary-text: #bdbdbd;
      --card-bg: #171a21;
      --border: #2b2f38;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      text-align: center;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    canvas {
      background: var(--card-bg);
      display: none;
      margin: 20px auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    #menu {
      padding: 100px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    #menu h1 {
      font-size: clamp(2.8rem, 5vw, 5rem);
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 2rem;
    }

    #highscoreDisplay {
      margin-top: 20px;
      font-size: 1.25rem;
      color: var(--secondary-text);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 122, 0, 0.2);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 100;
    }

    .theme-toggle svg {
      width: 24px;
      height: 24px;
      fill: var(--text);
    }

    .footer {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: var(--secondary-text);
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      #menu {
        padding: 60px 20px;
      }
      
      canvas {
        width: 95%;
        height: auto;
      }
    }
  </style>
</head>
<body>

<div class="theme-toggle" id="themeToggle">
  <svg viewBox="0 0 24 24">
    <path d="M12,9c1.65,0,3,1.35,3,3s-1.35,3-3,3s-3-1.35-3-3S10.35,9,12,9 M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5 S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S1.45,13,2,13z M20,13l2,0c0.55,0,1-0.45,1-1 s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13z M11,2v2c0,0.55,0.45,1,1,1s1-0.45,1-1V2c0-0.55-0.45-1-1-1S11,1.45,11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2c0-0.55-0.45-1-1-1C11.45,19,11,19.45,11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0 c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95 c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41 L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41 s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06 c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>
  </svg>
</div>

<div id="menu">
  <h1>Paddle Game</h1>
  <button id="playButton" class="btn">Spielen</button>
  <div id="highscoreDisplay">Highscore: 0</div>
</div>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<div class="footer">
  © 2026 lamacHub
</div>

<script>
  // Theme Toggle
  const themeToggle = document.getElementById('themeToggle');
  const body = document.body;
  
  // Check for saved theme preference or respect OS preference
  const savedTheme = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
    body.classList.add('dark-mode');
  }
  
  themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    const isDark = body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  // Game Code
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const menu = document.getElementById("menu");
  const playButton = document.getElementById("playButton");
  const highscoreDisplay = document.getElementById("highscoreDisplay");

  let paddle, ball, score, highscore = 0, gameRunning = false;

  function resetGame() {
    paddle = {
      width: 100, 
      height: 15, 
      x: canvas.width / 2 - 50, 
      y: canvas.height - 30, 
      speed: 7, 
      dx: 0
    };

    ball = {
      x: canvas.width / 2, 
      y: canvas.height / 2, 
      radius: 10, 
      speed: 4, 
      dx: 4, 
      dy: -4
    };

    score = 0;
    gameRunning = true;
  }

  function drawPaddle() {
    ctx.fillStyle = "#ff7a00";
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    // Add rounded corners
    ctx.beginPath();
    const radius = 6;
    ctx.moveTo(paddle.x + radius, paddle.y);
    ctx.lineTo(paddle.x + paddle.width - radius, paddle.y);
    ctx.quadraticCurveTo(paddle.x + paddle.width, paddle.y, paddle.x + paddle.width, paddle.y + radius);
    ctx.lineTo(paddle.x + paddle.width, paddle.y + paddle.height - radius);
    ctx.quadraticCurveTo(paddle.x + paddle.width, paddle.y + paddle.height, paddle.x + paddle.width - radius, paddle.y + paddle.height);
    ctx.lineTo(paddle.x + radius, paddle.y + paddle.height);
    ctx.quadraticCurveTo(paddle.x, paddle.y + paddle.height, paddle.x, paddle.y + paddle.height - radius);
    ctx.lineTo(paddle.x, paddle.y + radius);
    ctx.quadraticCurveTo(paddle.x, paddle.y, paddle.x + radius, paddle.y);
    ctx.closePath();
    ctx.fill();
  }

  function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#ff7a00";
    ctx.fill();
    ctx.closePath();
  }

  function drawScore() {
    ctx.fillStyle = "var(--text)";
    ctx.font = "18px 'Inter', sans-serif";
    ctx.fillText("Punkte: " + score, 10, 20);
  }

  function movePaddle() {
    paddle.x += paddle.dx;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.width > canvas.width)
      paddle.x = canvas.width - paddle.width;
  }

  function moveBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wandkollision
    if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width)
      ball.dx *= -1;
    if (ball.y - ball.radius < 0)
      ball.dy *= -1;

    // Paddle-Kollision
    if (
      ball.y + ball.radius >= paddle.y &&
      ball.x >= paddle.x &&
      ball.x <= paddle.x + paddle.width
    ) {
      ball.dy *= -1;
      score++;
      if (score > highscore) highscore = score;
    }

    // Game Over
    if (ball.y - ball.radius > canvas.height) {
      gameRunning = false;
      showMenu();
    }
  }

  function draw() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPaddle();
    drawBall();
    drawScore();
    movePaddle();
    moveBall();

    requestAnimationFrame(draw);
  }

  function keyDown(e) {
    if (e.key === "ArrowRight") paddle.dx = paddle.speed;
    else if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  }

  function keyUp(e) {
    if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
  }

  function showMenu() {
    canvas.style.display = "none";
    menu.style.display = "block";
    highscoreDisplay.textContent = "Highscore: " + highscore;
  }

  function startGame() {
    resetGame();
    menu.style.display = "none";
    canvas.style.display = "block";
    draw();
  }

  // Touchsteuerung hinzufügen
  let touchStartX = 0;

  function touchStart(e) {
    touchStartX = e.touches[0].clientX;
    e.preventDefault();
  }

  function touchMove(e) {
    if (!gameRunning) return;
    const touchMoveX = e.touches[0].clientX;
    const touchDiff = touchMoveX - touchStartX;

    paddle.x += touchDiff * 1.0;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.width > canvas.width)
      paddle.x = canvas.width - paddle.width;

    touchStartX = touchMoveX;
    e.preventDefault();
  }

  playButton.addEventListener("click", startGame);
  document.addEventListener("keydown", keyDown);
  document.addEventListener("keyup", keyUp);
  canvas.addEventListener("touchstart", touchStart);
  canvas.addEventListener("touchmove", touchMove);

  showMenu();
</script>

</body>
</html>
