<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --accent:#ff7a00;
  --border:rgba(0,0,0,0.08);
}

.dark{
  --bg:#0b0f17;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:32px;
  height:32px;
}

.logo span{
  color:black; /* WICHTIG: einzige schwarze Überschrift */
  font-weight:700;
}

.toggle{
  background:var(--card);
  border:1px solid var(--border);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:950px;
  margin:auto;
  padding:20px;
  display:grid;
  gap:16px;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
}

/* TEXT */
h2{
  margin-top:0;
  color:var(--accent);
}

h3{
  margin:0 0 6px 0;
}

.small{
  font-size:13px;
  color:var(--muted);
}

/* NEWS */
.news-item{
  margin-top:12px;
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,0.04);
}

.dark .news-item{
  background:rgba(255,255,255,0.03);
}

/* LINKS */
a{
  color:var(--accent);
  text-decoration:none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/lamacos/lamacos.github.io/refs/heads/main/logo.png">
    <span>InfoHub</span>
  </div>

  <button class="toggle" onclick="toggleMode()">🌗</button>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h2>Kalenderwoche</h2>
    <div id="week"></div>
  </div>

  <div class="card">
    <h2>Satz der Woche</h2>
    <div>Kleine Schritte führen zu großen Veränderungen</div>
  </div>

  <div class="card">
    <h2>Wort des Tages</h2>
    <div id="word">Lade...</div>
  </div>

  <div class="card">
    <h2>News</h2>
    <div id="news">Lade...</div>
  </div>

</div>

<script>

const RSS_PROXY =
  "https://api.rss2json.com/v1/api.json?rss_url=";

const customNews = [
  {
    title: "Hide and Seek entfällt",
    date: "29.05.2026 11:15",
    description:
      "Das geplante Event fällt wahrscheinlich aus."
  }
];

/* MODE */
function toggleMode(){
  document.body.classList.toggle("dark");
}

/* WEEK */
function getWeekNumber(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function loadWeek(){
  document.getElementById("week").innerHTML =
    "Kalenderwoche: <b>" + getWeekNumber(new Date()) + "</b>";
}

/* WORD */
async function loadWord(){
  try{
    const url = RSS_PROXY + encodeURIComponent(
      "https://www.merriam-webster.com/wotd/feed/rss2"
    );

    const res = await fetch(url);
    const data = await res.json();
    const item = data.items[0];

    document.getElementById("word").innerHTML = `
      <h3>${item.title}</h3>
      <div class="small">${item.pubDate}</div>
      <p>${item.description}</p>
    `;
  } catch(e){
    document.getElementById("word").innerHTML = "Fehler beim Laden.";
  }
}

/* NEWS */
async function loadNews(){
  try{
    const url = RSS_PROXY + encodeURIComponent(
      "https://www.tagesschau.de/xml/rss2"
    );

    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    customNews.forEach(n=>{
      html += `
        <div class="news-item">
          <h3>${n.title}</h3>
          <div class="small">${n.date}</div>
          <p>${n.description}</p>
        </div>
      `;
    });

    data.items.slice(0,15).forEach(n=>{
      html += `
        <div class="news-item">
          <h3>${n.title}</h3>
          <div class="small">${n.pubDate}</div>
          <p>${n.description || ""}</p>
        </div>
      `;
    });

    document.getElementById("news").innerHTML = html;

  } catch(e){
    document.getElementById("news").innerHTML = "Fehler beim Laden.";
  }
}

/* INIT */
loadWeek();
loadWord();
loadNews();

</script>

</body>
</html>

<script>

</script>

</body>
</html>
