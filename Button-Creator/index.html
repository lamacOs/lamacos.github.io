<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f7fb;
  --card: rgba(255,255,255,0.85);
  --text: #0f172a;
  --muted: rgba(15,23,42,0.6);
  --border: rgba(15,23,42,0.08);
  --accent: #ff7a00;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
  --bg: #0b0f19;
  --card: rgba(17,24,39,0.75);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.6);
  --border: rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

/* ALLE ÜBERSCHRIFTEN ORANGE */
h1, h2, h3, h4 {
  color: var(--accent);
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
}

.logo img {
  width: 34px;
  height: 34px;
  border-radius: 8px;
}

.toggle {
  border: 1px solid var(--border);
  background: var(--card);
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 18px;
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 20px;
  box-shadow: var(--shadow);
}

label {
  display: block;
  margin-top: 12px;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 0.9rem;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}

.actionButton {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: var(--accent);
  color: white;
  font-weight: 600;
}

/* PREVIEW */
.previewArea {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

#previewButton,
#fullscreenButton {
  border: none;
  border-radius: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* FULLSCREEN */
#fullscreenView {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
}

#exitFullscreen {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  margin-top: 40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/lamacos.github.io/logo.png">
    lamacOs
  </div>

  <button class="toggle" onclick="toggleTheme()">🌗</button>
</div>

<div class="container">

  <div class="grid">

    <div class="panel">
      <h2>Button Einstellungen</h2>

      <label>Typ</label>
      <select id="buttonType">
        <option value="text">Text</option>
        <option value="image">Bild</option>
        <option value="video">Video</option>
      </select>

      <label>Text</label>
      <input id="buttonText">

      <label>Datei</label>
      <input type="file" id="buttonFile">

      <label>Farbe</label>
      <input type="color" id="buttonColor" value="#ff7a00">

      <label>Textfarbe</label>
      <input type="color" id="buttonTextColor" value="#ffffff">

      <label>Größe</label>
      <input type="number" id="buttonSize" value="160">

      <label>Form</label>
      <select id="buttonShape">
        <option value="0">Eckig</option>
        <option value="18">Rounded</option>
        <option value="999">Kreis</option>
      </select>

      <button class="actionButton" onclick="apply()">Übernehmen</button>
    </div>

    <div class="panel">
      <h2>Event Einstellungen</h2>

      <label>Event Text</label>
      <input id="eventText">

      <label>Farbe</label>
      <input type="color" id="eventColor" value="#ff7a00">

      <label>Größe</label>
      <input type="number" id="eventSize" value="80">

      <label>Dauer (ms)</label>
      <input type="number" id="eventDuration" value="4000">

      <button class="actionButton" onclick="openFS()">Fullscreen</button>
    </div>

  </div>

  <div class="previewArea">
    <button id="previewButton">Preview</button>
  </div>

</div>

<div id="fullscreenView">
  <button id="exitFullscreen" onclick="closeFS()">✕</button>
  <button id="fullscreenButton"></button>
</div>

<footer>
  © 2026 lamacHub
</footer>

<script>
let mediaURL = null;

/* DARKMODE FIX */
function toggleTheme() {
  const root = document.documentElement;
  const isDark = root.getAttribute("data-theme") === "dark";

  if (isDark) {
    root.removeAttribute("data-theme");
    localStorage.setItem("theme", "light");
  } else {
    root.setAttribute("data-theme", "dark");
    localStorage.setItem("theme", "dark");
  }
}

(function initTheme() {
  const saved = localStorage.getItem("theme");
  if (saved === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
  }
})();

function apply() {
  const el = document.getElementById("previewButton");

  const type = buttonType.value;
  const size = buttonSize.value;

  el.style.width = size + "px";
  el.style.height = size + "px";
  el.style.background = buttonColor.value;
  el.style.color = buttonTextColor.value;
  el.style.borderRadius = buttonShape.value + "px";

  if (type === "text") {
    el.textContent = buttonText.value || "Button";
  }
}

function openFS() {
  document.getElementById("fullscreenView").style.display = "flex";

  const fs = document.getElementById("fullscreenButton");
  const p = document.getElementById("previewButton");

  fs.innerHTML = p.innerHTML;
  fs.style.width = p.style.width;
  fs.style.height = p.style.height;
  fs.style.background = p.style.background;
  fs.style.borderRadius = p.style.borderRadius;
}

function closeFS() {
  document.getElementById("fullscreenView").style.display = "none";
}

document.getElementById("fullscreenButton").onclick = () => {
  const out = document.createElement("div");

  out.innerText = eventText.value;
  out.style.color = eventColor.value;
  out.style.fontSize = eventSize.value + "px";

  document.getElementById("fullscreenView").appendChild(out);

  setTimeout(() => out.remove(), eventDuration.value);
};

apply();
</script>

</body>
</html>
