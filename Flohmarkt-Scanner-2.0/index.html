<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lager App</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f17;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#ff7a00;
  --danger:#ef4444;
  --border:rgba(255,255,255,0.08);
}

.light{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  color:var(--accent);
}

.logo img{
  width:30px;
  height:30px;
}

button{
  padding:12px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  width:100%;
  margin-top:10px;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

button.delete{
  background:var(--danger);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:18px;
  border-radius:16px;
  margin-top:15px;
  transition:0.3s;
}

.hidden{display:none;}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  outline:none;
}

h2,h3{
  color:var(--accent);
  margin-top:0;
}

.codeBox{
  text-align:center;
  font-size:28px;
  letter-spacing:4px;
  padding:20px;
  border-radius:12px;
  background:rgba(0,0,0,0.2);
}

.item{
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  margin-top:10px;
}

.topbar{
  display:flex;
  gap:10px;
}

.smallBtn{
  width:auto;
  padding:10px 14px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="navbar">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/lamacos/lamacos.github.io/refs/heads/main/logo.png">
      lamacOs
    </div>

    <div class="topbar">
      <button class="smallBtn" onclick="toggleMode()">🌗</button>
    </div>
  </div>

  <h2>📦 Lager-App</h2>

  <div id="home" class="card">
    <button onclick="openAdd()">➕ Erstellen</button>
    <button onclick="openScan()">📷 Scannen</button>
  </div>

  <!-- ADD -->
  <div id="add" class="hidden card">
    <h3>Neuer Eintrag</h3>

    <select id="typ" onchange="switchTyp()">
      <option value="produkt">Produkt</option>
      <option value="karton">Karton</option>
      <option value="set">Set</option>
    </select>

    <input id="productName" placeholder="Name">
    <input id="preis" placeholder="Preis (€)">

    <div id="inhaltBereich" class="hidden">
      <h3>Inhalt</h3>
      <div id="inhaltListe"></div>
      <button onclick="addInhalt()">➕ Inhalt hinzufügen</button>
    </div>

    <button onclick="generateCode()">🔐 Code generieren</button>
    <button onclick="backHome()">⬅️ Zurück</button>
  </div>

  <!-- CODE VIEW -->
  <div id="codeView" class="hidden card">
    <h3>Dein Code</h3>
    <div class="codeBox" id="codeText"></div>
    <button onclick="closeCode()">Schließen</button>
  </div>

  <!-- SCAN -->
  <div id="scan" class="hidden card">
    <h3>Scan / Suche</h3>
    <input id="manualCode" placeholder="Code eingeben">
    <button onclick="loadByCode()">🔎 Anzeigen</button>
    <div id="scanResult"></div>
    <button onclick="stopScan()">Schließen</button>
  </div>

</div>

<!-- Scanner Container (absichtlich unsichtbar, wie gewünscht) -->
<div id="reader" style="display:none;"></div>

<script>
let inhalt = [];
let scanner;
let currentCode = null;

/* MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* NAV */
function openAdd(){
  home.classList.add("hidden");
  add.classList.remove("hidden");
}

function backHome(){
  add.classList.add("hidden");
  home.classList.remove("hidden");
}

function switchTyp(){
  const t = typ.value;
  preis.classList.toggle("hidden", t === "karton");
  inhaltBereich.classList.toggle("hidden", t === "produkt");
}

/* INHALT */
function addInhalt(){
  const box = document.createElement("div");
  box.className = "item";

  const sel = document.createElement("select");
  ["Produkt","Inhalt","Karton","Set"].forEach(v=>{
    const o=document.createElement("option");
    o.value=v.toLowerCase();
    o.textContent=v;
    sel.appendChild(o);
  });

  const name = document.createElement("input");
  name.placeholder = "Name";

  const price = document.createElement("input");
  price.placeholder = "Preis";

  box.append(sel,name,price);
  inhaltListe.appendChild(box);

  [sel,name,price].forEach(e=>e.oninput=updateInhalt);
  updateInhalt();
}

function updateInhalt(){
  inhalt = [...document.querySelectorAll(".item")].map(i=>({
    typ:i.children[0].value,
    name:i.children[1].value,
    preis:i.children[2].value
  }));
}

/* GENERATE */
function generateCode(){
  const name = productName.value.trim();
  if(!name) return alert("Name fehlt!");

  const code = Math.random().toString(36).substring(2,8).toUpperCase();

  let data = { typ:typ.value, name };

  if(typ.value !== "karton"){
    if(!preis.value) return alert("Preis fehlt!");
    data.preis = preis.value;
  }

  if(typ.value !== "produkt"){
    data.inhalt = inhalt;
  }

  localStorage.setItem(code, JSON.stringify(data));

  add.classList.add("hidden");
  codeView.classList.remove("hidden");
  codeText.textContent = code;
}

/* CODE */
function closeCode(){
  codeView.classList.add("hidden");
  home.classList.remove("hidden");
}

/* SCAN */
function openScan(){
  home.classList.add("hidden");
  scan.classList.remove("hidden");

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    {},
    text=>{
      manualCode.value = text;
      loadByCode();
      scanner.stop();
    }
  );
}

function loadByCode(){
  const code = manualCode.value.trim().toUpperCase();
  const data = localStorage.getItem(code);
  currentCode = code;

  if(!data){
    scanResult.innerHTML = "❌ Nicht gefunden";
    return;
  }

  const o = JSON.parse(data);

  let html = `<h3>${o.name}</h3>`;
  if(o.preis) html += `<p>Preis: ${o.preis} €</p>`;

  if(o.inhalt){
    html += "<div>";
    o.inhalt.forEach(i=>{
      html += `<div class="item">${i.typ}: ${i.name} ${i.preis?`(${i.preis} €)`:""}</div>`;
    });
    html += "</div>";
  }

  html += `<button class="delete" onclick="deleteEntry()">🗑️ Löschen</button>`;
  scanResult.innerHTML = html;
}

function deleteEntry(){
  if(!currentCode) return;
  if(!confirm("Wirklich löschen?")) return;

  localStorage.removeItem(currentCode);
  scanResult.innerHTML = "Gelöscht";
  manualCode.value = "";
  currentCode = null;
}

function stopScan(){
  scanner?.stop();
  scan.classList.add("hidden");
  home.classList.remove("hidden");
}
</script>

<footer style="text-align:center;opacity:0.6;margin-top:20px;">
  © 2026 lamacHub
</footer>

</body>
</html>
