<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack-O-Mat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #ffffff;
  --text: #111111;
  --card: #f6f7fb;
  --accent: #ff7a00;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.06);
}

[data-theme="dark"] {
  --bg: #0f0f12;
  --text: #ffffff;
  --card: #17171c;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Inter, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  transition: background .25s;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  width: 38px;
  height: 38px;
  border-radius: 10px;
}

.logo span {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  transition: color .25s;
}

.toggle {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: .25s;
  margin-top: 0;
  font-size: 15px;
}

.toggle:hover { transform: translateY(-2px); }

/* LAYOUT */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  transition: .25s;
}

.card:hover { transform: translateY(-2px); }

/* HEADLINES */
h1, h2, h3 {
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 700;
}

h1 { font-size: 36px; }
h2 { font-size: 28px; }
h3 { font-size: 22px; }

/* FORM */
label {
  display: block;
  margin-top: 16px;
  margin-bottom: 6px;
  font-weight: 600;
  color: var(--text);
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: .25s;
}

input::placeholder, textarea::placeholder {
  color: rgba(128,128,128,.8);
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
}

/* Override für Checkboxen */
input[type="checkbox"] {
  width: auto;
  transform: scale(1.2);
}

button {
  margin-top: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: .25s;
}

button:hover { opacity: .9; transform: translateY(-2px); }

/* PACKLISTE */
#packliste ul { list-style: none; }

#packliste li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: rgba(255,122,0,.06);
}

[data-theme="dark"] #packliste li {
  background: rgba(255,122,0,.12);
}

/* GESPEICHERTE LISTEN */
#alleListen { list-style: none; }
#alleListen li { margin-bottom: 10px; }

/* SHARE */
#shareContainer { margin-top: 20px; }
#shareLink { margin-top: 10px; }

#qrWrapper {
  margin-top: 20px;
  text-align: center;
}

#qrcode {
  margin-top: 15px;
  display: flex;
  justify-content: center;
}

#qrcode img, #qrcode canvas {
  background: white;
  padding: 10px;
  border-radius: 12px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text);
  border-top: 1px solid var(--border);
}

footer p { opacity: .7; }

.small {
  font-size: 14px;
  opacity: .8;
  color: var(--text);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 999px; }

/* MOBILE */
@media (max-width: 768px) {
  .container { padding: 20px 14px; }
  .navbar { padding: 12px 16px; }
  .logo span { font-size: 18px; }
  h1 { font-size: 30px; }
  h2 { font-size: 24px; }
  h3 { font-size: 20px; }
  .card { padding: 18px; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/lamacOs/lamacos.github.io/refs/heads/main/logo.png" alt="Logo">
    <span>Pack-O-Mat</span>
  </div>
  <button class="toggle" onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<div class="container">

  <!-- Generator -->
  <div class="card">
    <h1>Packliste Generator</h1>

    <label for="datum">Reisedatum:</label>
    <input type="date" id="datum">

    <label for="tage">Reisedauer (Tage):</label>
    <input type="number" id="tage" value="1" min="1">

    <label for="unterkunft">Unterkunft:</label>
    <select id="unterkunft">
      <option value="hotel">Hotel / Ferienwohnung</option>
      <option value="zelt">Zelt / Camping</option>
    </select>

    <label for="klima">Klima:</label>
    <select id="klima">
      <option value="heiß">Heiß</option>
      <option value="warm">Warm</option>
      <option value="mittel">Mittel</option>
      <option value="kalt">Kalt</option>
    </select>

    <label for="gelaende">Gelände:</label>
    <select id="gelaende">
      <option value="flach">Flach</option>
      <option value="huegelig">Hügelig</option>
      <option value="bergig">Bergig</option>
      <option value="stadt">Stadt</option>
      <option value="wald">Wald</option>
    </select>

    <button onclick="erstellePackliste()">Packliste erstellen</button>
  </div>

  <!-- Packliste -->
  <div class="card">
    <h2>Deine Packliste</h2>
    <div id="packliste">
      <p class="small">Noch keine Packliste erstellt.</p>
    </div>
  </div>

  <!-- Eigenes Item -->
  <div class="card">
    <h3>Eigenes Item hinzufügen</h3>
    <input id="eigenesItem" type="text" placeholder="z. B. Kopfhörer">
    <button onclick="eigenesTeilHinzufuegen()">Hinzufügen</button>
  </div>

  <!-- Speichern -->
  <div class="card">
    <h3>Packliste speichern</h3>
    <input id="listenName" type="text" placeholder="Name der Liste">
    <button onclick="speicherePackliste()">Speichern</button>
  </div>

  <!-- Teilen -->
  <div class="card">
    <h3>Packliste teilen</h3>
    <p class="small">
      Die Packliste wird als Link kodiert und kann über einen QR-Code geöffnet werden.
    </p>
    <button onclick="teilePackliste()">Link erstellen</button>

    <div id="shareContainer" style="display:none;">
      <label>Freigabelink:</label>
      <input id="shareLink" readonly>
      <button onclick="copyShareLink()">Link kopieren</button>

      <div id="qrWrapper">
        <h3>QR-Code</h3>
        <div id="qrcode"></div>
      </div>
    </div>
  </div>

  <!-- Gespeicherte Listen -->
  <div class="card">
    <h3>Gespeicherte Listen</h3>
    <ul id="alleListen"></ul>
  </div>

</div>

<footer>
  <p>© 2026 lamacHub</p>
</footer>

<!-- QR-Code Bibliothek -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// =====================================================
// GLOBALER STATE
// =====================================================
let liste = [];

// =====================================================
// THEME
// =====================================================
function toggleTheme() {
  const root = document.documentElement;
  root.dataset.theme = root.dataset.theme === "dark" ? "" : "dark";
}

// =====================================================
// PACKLISTE ERSTELLEN
// =====================================================
function getJahreszeitVonBis(startDatum, tage) {
  const d = new Date(startDatum);
  const monate = new Set();

  for (let i = 0; i < tage; i++) {
    monate.add(d.getMonth());
    d.setDate(d.getDate() + 1);
  }

  return [...monate].map(m =>
    m >= 2 && m <= 4 ? "frühling" :
    m >= 5 && m <= 7 ? "sommer"   :
    m >= 8 && m <= 10 ? "herbst"  : "winter"
  );
}

function erstellePackliste() {
  const datum     = document.getElementById("datum").value;
  const tage      = parseInt(document.getElementById("tage").value);
  const klima     = document.getElementById("klima").value;
  const unterkunft = document.getElementById("unterkunft").value;
  const gelaende  = document.getElementById("gelaende").value;

  if (!datum || tage < 1) {
    alert("Bitte Reisedatum und Reisedauer angeben.");
    return;
  }

  const jahreszeiten = getJahreszeitVonBis(datum, tage);

  liste = [];

  // Basis-Items
  liste.push(
    "Unterwäsche (je Tag 1x)",
    "Socken (je Tag 1x)",
    "Zahnbürste & Zahnpasta",
    "Ladekabel",
    "Reisepass / Personalausweis",
    "Geldbörse / Kreditkarte"
  );

  // Jahreszeit
  if (jahreszeiten.includes("sommer") || jahreszeiten.includes("frühling")) {
    liste.push("T-Shirts", "Shorts", "Sonnencreme", "Sonnenbrille");
  }
  if (jahreszeiten.includes("herbst")) {
    liste.push("Zwischenjacke", "Lange Hosen");
  }
  if (jahreszeiten.includes("winter")) {
    liste.push("Warme Jacke", "Schal & Mütze", "Handschuhe", "Thermounterwäsche");
  }

  // Klima
  if (klima === "heiß") liste.push("Sonnenhut", "Elektrolyte / Wasserflaschen");
  if (klima === "kalt") liste.push("Dicke Jacke", "Wärmflaschen-Alternative");

  // Unterkunft
  if (unterkunft === "zelt") {
    liste.push(
      "Zelt",
      "Schlafsack",
      "Isomatte / Luftmatratze",
      "Campingkocher + Gas",
      "Besteck",
      "Taschenlampe / Stirnlampe",
      "Zeckenzange"
    );
  } else {
    liste.push("Hausschuhe", "Ohrstöpsel");
  }

  // Gelände
  if (gelaende === "bergig") {
    liste.push("Wanderschuhe", "Wanderstöcke", "Erste-Hilfe-Set", "Karte / GPS");
  }
  if (gelaende === "wald") {
    liste.push("Insektenschutz", "Erste-Hilfe-Set", "Kompass");
  }
  if (gelaende === "stadt") {
    liste.push("Komfortschuhe", "Stadtführer / Maps-App");
  }

  render();
}

// =====================================================
// RENDERN
// =====================================================
function render() {
  const el = document.getElementById("packliste");

  if (liste.length === 0) {
    el.innerHTML = '<p class="small">Noch keine Packliste erstellt.</p>';
    return;
  }

  el.innerHTML = `
    <ul>
      ${liste.map((item, i) => `
        <li>
          <input type="checkbox" id="item-${i}" onchange="strikeItem(${i}, this)">
          <label for="item-${i}" id="label-${i}" style="cursor:pointer;margin:0;">${item}</label>
        </li>
      `).join("")}
    </ul>
    <p class="small" style="margin-top:12px;">
      ${liste.length} Items insgesamt
    </p>
  `;
}

function strikeItem(index, checkbox) {
  const lbl = document.getElementById("label-" + index);
  lbl.style.textDecoration = checkbox.checked ? "line-through" : "none";
  lbl.style.opacity = checkbox.checked ? ".5" : "1";
}

// =====================================================
// EIGENE ITEMS
// =====================================================
function eigenesTeilHinzufuegen() {
  const input = document.getElementById("eigenesItem");
  const val = input.value.trim();
  if (!val) return;
  liste.push(val);
  input.value = "";
  render();
}

// Auch mit Enter auslösen
document.getElementById("eigenesItem").addEventListener("keydown", function(e) {
  if (e.key === "Enter") eigenesTeilHinzufuegen();
});

// =====================================================
// SPEICHERN (localStorage)
// =====================================================
function speicherePackliste() {
  const name = document.getElementById("listenName").value.trim();
  if (!name) { alert("Bitte einen Namen vergeben."); return; }
  if (liste.length === 0) { alert("Die Packliste ist leer."); return; }

  const local = JSON.parse(localStorage.getItem("alleListen") || "{}");
  local[name] = liste;
  localStorage.setItem("alleListen", JSON.stringify(local));

  document.getElementById("listenName").value = "";
  loadSaved();
  alert(`Liste "${name}" gespeichert!`);
}

// =====================================================
// GESPEICHERTE LISTEN LADEN
// =====================================================
function loadSaved() {
  const ul = document.getElementById("alleListen");
  ul.innerHTML = "";

  const local = JSON.parse(localStorage.getItem("alleListen") || "{}");
  const namen = Object.keys(local);

  if (namen.length === 0) {
    ul.innerHTML = '<li class="small">Noch keine Listen gespeichert.</li>';
    return;
  }

  namen.forEach(n => {
    const li = document.createElement("li");
    li.style.display = "flex";
    li.style.gap = "10px";

    const btn = document.createElement("button");
    btn.textContent = n;
    btn.style.marginTop = "0";
    btn.onclick = () => lade(n);

    const del = document.createElement("button");
    del.textContent = "🗑";
    del.style.marginTop = "0";
    del.style.background = "rgba(255,60,60,.15)";
    del.style.color = "var(--text)";
    del.title = "Liste löschen";
    del.onclick = () => loescheList(n);

    li.appendChild(btn);
    li.appendChild(del);
    ul.appendChild(li);
  });
}

function lade(n) {
  const local = JSON.parse(localStorage.getItem("alleListen") || "{}");
  liste = local[n] || [];
  render();
}

function loescheList(n) {
  if (!confirm(`Liste "${n}" wirklich löschen?`)) return;
  const local = JSON.parse(localStorage.getItem("alleListen") || "{}");
  delete local[n];
  localStorage.setItem("alleListen", JSON.stringify(local));
  loadSaved();
}

// =====================================================
// TEILEN (URL-kodiert, kein Server nötig)
// =====================================================
function teilePackliste() {
  if (liste.length === 0) { alert("Die Packliste ist leer."); return; }

  const encoded = encodeURIComponent(JSON.stringify(liste));
  const url = `${location.origin}${location.pathname}?liste=${encoded}`;

  document.getElementById("shareContainer").style.display = "block";
  document.getElementById("shareLink").value = url;

  // QR Code
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 180,
    height: 180
  });
}

function copyShareLink() {
  const input = document.getElementById("shareLink");
  input.select();
  navigator.clipboard.writeText(input.value).catch(() => {
    document.execCommand("copy");
  });
  alert("Link kopiert!");
}

// =====================================================
// GETEILTE LISTE LADEN (aus URL-Parameter)
// =====================================================
function loadShared() {
  const params = new URLSearchParams(location.search);
  const raw = params.get("liste");
  if (!raw) return;

  try {
    liste = JSON.parse(decodeURIComponent(raw));
    render();
  } catch(e) {
    console.error("Fehler beim Laden der geteilten Liste:", e);
  }
}

// =====================================================
// INIT
// =====================================================
loadSaved();
loadShared();
</script>

</body>
</html>
